<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flag Football Coach Pro</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: #fafafa; color: #333; }
    .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
    h1 { margin: 0 0 16px 0; font-size: 32px; font-weight: 700; }
    h2 { font-size: 24px; font-weight: 600; margin-bottom: 20px; margin-top: 0; }
    h3 { font-size: 16px; font-weight: 600; margin: 0 0 12px 0; }
    .header { margin-bottom: 24px; border-bottom: 1px solid #ddd; padding-bottom: 16px; }
    .team-buttons { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .team-btn { padding: 10px 16px; border: 0.5px solid #ccc; border-radius: 6px; background: white; color: #333; cursor: pointer; font-weight: 500; font-size: 14px; }
    .team-btn.active { border: 2px solid #333; background: #333; color: white; }
    .tab-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; }
    .tab-btn { padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 4px; background: #f5f5f5; color: #333; cursor: pointer; font-size: 12px; font-weight: 400; }
    .tab-btn.active { border: 1px solid #333; background: #333; color: white; font-weight: 600; }
    .view { display: none; }
    .view.active { display: block; }
    .form-group { display: grid; gap: 8px; margin-bottom: 12px; }
    .input, select, textarea { padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 4px; font-size: 14px; font-family: inherit; }
    textarea { min-height: 100px; resize: vertical; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-primary { background: #333; color: white; }
    .btn-success { background: #28a745; color: white; }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-small { padding: 4px 8px; font-size: 12px; }
    .card { background: white; padding: 16px; border-radius: 8px; border: 0.5px solid #ddd; margin-bottom: 12px; }
    .stat-card { padding: 16px; background: white; border: 0.5px solid #ddd; border-radius: 8px; text-align: center; }
    .stat-label { font-size: 12px; color: #999; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; color: #333; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .player-list { display: grid; gap: 8px; }
    .player-item { padding: 12px; background: white; border: 0.5px solid #ddd; border-radius: 6px; display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; }
    .empty-state { text-align: center; padding: 40px; color: #999; background: white; border-radius: 8px; border: 0.5px solid #ddd; }
    .field-controls { background: #f0f8ff; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
    .game-banner { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; margin-bottom: 16px; }
    .game-score { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; margin-bottom: 12px; text-align: center; }
    .score-board { font-size: 48px; font-weight: 700; }
    .quarter-info { background: white; color: #333; padding: 8px 16px; border-radius: 4px; font-weight: 600; }
    .sub-history { background: #f9f9f9; padding: 12px; border-radius: 4px; margin: 8px 0; font-size: 12px; }
    .player-chip { padding: 6px 12px; background: #4caf50; color: white; border-radius: 20px; font-size: 12px; font-weight: 500; display: inline-block; margin-right: 8px; margin-bottom: 4px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 24px; border-radius: 8px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-close { float: right; cursor: pointer; font-size: 24px; }
    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏈  Flag Football Coach Pro</h1>
      <div class="team-buttons">
        <button class="team-btn active" data-team="5-6">5/6 Division</button>
        <button class="team-btn" data-team="7-8">7/8 Division</button>
      </div>
      <div class="tab-buttons">
        <button class="tab-btn active" data-view="home">📊 Dashboard</button>
        <button class="tab-btn" data-view="roster">👥 Roster</button>
        <button class="tab-btn" data-view="evals">⭐ Evals</button>
        <button class="tab-btn" data-view="practice">📋 Practices</button>
        <button class="tab-btn" data-view="playbook">📖 Playbook</button>
        <button class="tab-btn" data-view="gameday">🎮 Game</button>
      </div>
    </div>

    <div id="home" class="view active"></div>
    <div id="roster" class="view"></div>
    <div id="evals" class="view"></div>
    <div id="practice" class="view"></div>
    <div id="playbook" class="view"></div>
    <div id="gameday" class="view"></div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <h3>Edit Player</h3>
      <div class="form-group">
        <input type="text" id="editName" class="input" placeholder="Player name">
        <input type="text" id="editNumber" class="input" placeholder="Jersey #">
        <button class="btn btn-primary" onclick="savePlayerEdit()">Save</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let activeTeam = '5-6';
    let activeView = 'home';
    let editingPlayerId = null;
    let currentGame = null;
    let appData = {
      teams: {
        '5-6': { name: '5/6 Division', players: [], practices: [], playbook: [], games: [], evals: {} },
        '7-8': { name: '7/8 Division', players: [], practices: [], playbook: [], games: [], evals: {} }
      }
    };

    const drills = ['Teamwork', 'High Knees', 'Butt Kicks', 'Gear Runs', 'Log Roll Bonanza', 'Meet in the Middle Grip Drill', 'Catch and Step with Partner', 'Hot Potato', 'Snake Run', 'Zig-zag Pathway', 'Position Tag', 'Multi-Directional Get Up and Go', 'Learning to Fall', 'Tag Games', 'Sharks and Minnows', 'Partner Mirror Drill', 'Throw and Catch Relay', 'Acceleration Drills', 'No-Step Kick Drill', 'Contact Dots Drill', 'Lateral Shuffle', 'Animal Relay', 'Balance Kicks', 'Partner Kicks'];

    const preBuiltWeeks = [
      { week: 'Week 1', title: 'Foundations', drills: ['Teamwork', 'High Knees', 'Gear Runs', 'Meet in the Middle Grip Drill', 'Catch and Step with Partner'] },
      { week: 'Week 2', title: 'Running & Receiving', drills: ['Teamwork', 'Butt Kicks', 'Zig-zag Pathway', 'Hot Potato', 'Snake Run'] },
      { week: 'Week 3', title: 'Kicking & Contact', drills: ['Teamwork', 'Lateral Shuffle', 'Balance Kicks', 'Learning to Fall', 'Tag Games'] },
      { week: 'Week 4', title: 'Offensive Skills', drills: ['Teamwork', 'Gear Runs', 'Meet in the Middle Grip Drill', 'Partner Mirror Drill', 'Sharks and Minnows'] },
      { week: 'Week 5', title: 'Defensive Drills', drills: ['Teamwork', 'Multi-Directional Get Up and Go', 'Snake Run', 'Throw and Catch Relay', 'Position Tag'] },
      { week: 'Week 6', title: 'Integrated Offense', drills: ['Teamwork', 'High Knees', 'Meet in the Middle Grip Drill', 'Throw and Catch Relay', 'Zig-zag Pathway'] },
      { week: 'Week 7', title: 'Mid-Season Review', drills: ['Teamwork', 'Gear Runs', 'Acceleration Drills', 'Hot Potato', 'Tag Games'] },
      { week: 'Week 8', title: 'Contact & Tackling', drills: ['Teamwork', 'Log Roll Bonanza', 'Learning to Fall', 'Animal Relay', 'Tag Games'] },
      { week: 'Week 9', title: 'Complex Patterns', drills: ['Teamwork', 'Catch and Step with Partner', 'Snake Run', 'Partner Mirror Drill', 'Sharks and Minnows'] },
      { week: 'Week 10', title: 'Endurance & Pace', drills: ['Teamwork', 'Gear Runs', 'Hot Potato', 'Tag Games', 'Throw and Catch Relay'] },
      { week: 'Week 11', title: 'Playoff Prep', drills: ['Teamwork', 'Meet in the Middle Grip Drill', 'High Knees', 'Zig-zag Pathway', 'Tag Games'] },
      { week: 'Week 12', title: 'Championship Focus', drills: ['Teamwork', 'Acceleration Drills', 'Partner Mirror Drill', 'Hot Potato', 'Sharks and Minnows'] }
    ];

    function init() {
      loadData();
      setupEventListeners();
      renderView();
    }

    function loadData() {
      const saved = localStorage.getItem('football-coach-pro');
      if (saved) appData = JSON.parse(saved);
      
      // Ensure all required arrays exist (data migration)
      if (appData.teams) {
        Object.values(appData.teams).forEach(team => {
          if (!team.playbook) team.playbook = [];
          if (!team.players) team.players = [];
          if (!team.practices) team.practices = [];
          if (!team.games) team.games = [];
          if (!team.evals) team.evals = {};
        });
      }
    }

    function saveData() {
      localStorage.setItem('football-coach-pro', JSON.stringify(appData));
    }

    function setupEventListeners() {
      document.querySelectorAll('.team-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          activeTeam = e.target.dataset.team;
          document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          currentGame = null;
          renderView();
        });
      });

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          activeView = e.target.dataset.view;
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          renderView();
        });
      });
    }

    function renderView() {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const viewEl = document.getElementById(activeView);
      viewEl.classList.add('active');

      if (activeView === 'home') renderHome();
      else if (activeView === 'roster') renderRoster();
      else if (activeView === 'evals') renderEvals();
      else if (activeView === 'practice') renderPractice();
      else if (activeView === 'playbook') renderPlaybook();
      else if (activeView === 'gameday') renderGameDay();
    }

    function renderHome() {
      const team = appData.teams[activeTeam];
      const avgRating = team.players.length > 0 ? (team.players.reduce((sum, p) => sum + (appData.teams[activeTeam].evals[p.id]?.overall || 0), 0) / team.players.length).toFixed(1) : 0;

      let html = `<h2>Team Dashboard: ${team.name}</h2>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">Players</div><div class="stat-value">${team.players.length}</div></div>
          <div class="stat-card"><div class="stat-label">Avg Rating</div><div class="stat-value">${avgRating}</div></div>
          <div class="stat-card"><div class="stat-label">Practices</div><div class="stat-value">${team.practices.length}</div></div>
          <div class="stat-card"><div class="stat-label">Plays</div><div class="stat-value">${team.playbook.length}</div></div>
          <div class="stat-card"><div class="stat-label">Games</div><div class="stat-value">${team.games.length}</div></div>
        </div>`;

      document.getElementById('home').innerHTML = html;
    }

    function renderRoster() {
      const team = appData.teams[activeTeam];
      let html = `<h2>Manage Roster</h2>
        <div class="card" style="background: #f0f8ff;">
          <h3>Add New Player</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px;">
            <input type="text" id="playerName" class="input" placeholder="Player name">
            <input type="text" id="playerNumber" class="input" placeholder="Jersey #">
            <button class="btn btn-primary" onclick="addPlayer()">Add</button>
          </div>
        </div>`;

      if (team.players.length === 0) {
        html += '<div class="empty-state">No players yet</div>';
      } else {
        html += `<div class="player-list">`;
        team.players.forEach(p => {
          const rating = appData.teams[activeTeam].evals[p.id]?.overall || '—';
          html += `<div class="player-item">
            <div><strong>#${p.number}  ${p.name}</strong><br><small style="color: #999;">Rating: ⭐ ${rating}</small></div>
            <div style="text-align: right;">Touches: ${p.stats?.touches || 0}  •  TDs: ${p.stats?.touchdowns || 0}</div>
            <div style="display: grid; gap: 4px;">
              <button class="btn btn-secondary btn-small" onclick="openEditModal('${p.id}')">Edit</button>
              <button class="btn btn-danger btn-small" onclick="removePlayer('${p.id}')">Remove</button>
            </div>
          </div>`;
        });
        html += '</div>';
      }

      document.getElementById('roster').innerHTML = html;
    }

    function openEditModal(id) {
      editingPlayerId = id;
      const player = appData.teams[activeTeam].players.find(p => p.id === id);
      document.getElementById('editName').value = player.name;
      document.getElementById('editNumber').value = player.number;
      document.getElementById('editModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
      editingPlayerId = null;
    }

    function savePlayerEdit() {
      if (editingPlayerId) {
        const player = appData.teams[activeTeam].players.find(p => p.id === editingPlayerId);
        player.name = document.getElementById('editName').value.trim();
        player.number = document.getElementById('editNumber').value;
        saveData();
        closeModal();
        renderRoster();
      }
    }

    function addPlayer() {
      const name = document.getElementById('playerName').value.trim();
      if (name) {
        appData.teams[activeTeam].players.push({
          id: Date.now().toString(),
          name,
          number: document.getElementById('playerNumber').value || '0',
          stats: { played: 0, touchdowns: 0, touches: 0, defensiveStops: 0 }
        });
        saveData();
        document.getElementById('playerName').value = '';
        document.getElementById('playerNumber').value = '';
        renderRoster();
      }
    }

    function removePlayer(id) {
      appData.teams[activeTeam].players = appData.teams[activeTeam].players.filter(p => p.id !== id);
      saveData();
      renderRoster();
    }

    function renderEvals() {
      document.getElementById('evals').innerHTML = '<h2>Player Evaluations</h2><div class="empty-state">Coming soon</div>';
    }

    function renderPractice() {
      const team = appData.teams[activeTeam];
      let html = `<h2>Practice Plans</h2>`;
      if (team.practices.length === 0) {
        html += '<div class="empty-state">No practices saved yet</div>';
      } else {
        team.practices.forEach(p => {
          html += `<div class="card"><strong>${p.title}</strong><br><small>${p.date}</small></div>`;
        });
      }
      document.getElementById('practice').innerHTML = html;
    }

    let currentPlayDiagram = { offense: [], defense: [], lines: [] };
    let drawMode = null;
    let draggedPlayer = null;

    const formationTemplates = {
      'Wing-T': { offense: [{x:140,y:120},{x:140,y:150},{x:180,y:100},{x:180,y:150},{x:200,y:135}], defense: [{x:280,y:110},{x:280,y:160},{x:320,y:135}] },
      'Pistol Spread': { offense: [{x:150,y:135},{x:180,y:100},{x:180,y:170},{x:200,y:120},{x:200,y:150}], defense: [{x:280,y:110},{x:280,y:160},{x:320,y:135}] },
      'I-Formation': { offense: [{x:140,y:135},{x:170,y:120},{x:170,y:150},{x:200,y:110},{x:200,y:160}], defense: [{x:280,y:110},{x:280,y:160},{x:320,y:135}] },
      'Shotgun': { offense: [{x:150,y:135},{x:180,y:90},{x:180,y:180},{x:210,y:120},{x:210,y:150}], defense: [{x:280,y:110},{x:280,y:160},{x:320,y:135}] }
    };

    function renderPlaybook() {
      const team = appData.teams[activeTeam];
      let html = `<h2>Playbook - Visual Play Builder</h2>
        <div style="display: grid; grid-template-columns: 1fr 220px; gap: 16px;">
          <div>
            <!-- Create Section -->
            <div class="card" style="background: #f0f8ff; margin-bottom: 16px;">
              <h3 style="margin-top: 0;">Create New Play</h3>
              <div class="form-group">
                <input type="text" id="playName" class="input" placeholder="Play name">
                <select id="playForm" class="input">
                  <option>Wing-T</option><option>Pistol Spread</option><option>I-Formation</option><option>Shotgun</option>
                </select>
                <select id="playCategory" class="input">
                  <option value="Offensive">Offensive</option><option value="Defensive">Defensive</option><option value="Red Zone">Red Zone</option><option value="3rd Down">3rd Down</option><option value="Goal Line">Goal Line</option>
                </select>
                <textarea id="playDesc" class="input" placeholder="Keys, reads, notes..." style="min-height: 70px;"></textarea>
                <button class="btn btn-success" onclick="saveNewPlay()" style="width: 100%;">Save Play</button>
              </div>
            </div>

            <!-- Tools -->
            <div class="card" style="background: white; margin-bottom: 16px;">
              <h3 style="margin-top: 0;">Drawing Tools</h3>
              <div class="field-controls">
                <div style="margin-bottom: 12px;">
                  <strong style="display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase;">Draw Lines</strong>
                  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px;">
                    <button class="btn btn-primary btn-small" onclick="setDrawMode('route')" id="drawRoute">→ Route</button>
                    <button class="btn btn-primary btn-small" onclick="setDrawMode('block')" id="drawBlock">⊡ Block</button>
                    <button class="btn btn-primary btn-small" onclick="setDrawMode('motion')" id="drawMotion">~ Motion</button>
                  </div>
                </div>
                <div style="margin-bottom: 12px;">
                  <strong style="display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase;">Add Players</strong>
                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                    <button class="btn btn-primary btn-small" onclick="addOffensePlayer()">+ Off</button>
                    <button class="btn btn-danger btn-small" onclick="addDefensePlayer()">+ Def</button>
                  </div>
                </div>
                <div>
                  <strong style="display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase;">Edit</strong>
                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                    <button class="btn btn-secondary btn-small" onclick="undoLine()">Undo</button>
                    <button class="btn btn-secondary btn-small" onclick="flipField()">Flip</button>
                  </div>
                  <button class="btn btn-secondary btn-small" onclick="resetTemplate()" style="width: 100%; margin-top: 4px;">Reset</button>
                </div>
              </div>
            </div>

            <!-- Field -->
            <div class="card">
              <h3 style="margin-top: 0;">Field Editor</h3>
              <p style="font-size: 11px; color: #666; margin-bottom: 12px;">Drag circles to move  •  Click to draw routes/blocks/motion</p>
              <svg id="fieldEditor" width="100%" height="400" viewBox="0 0 520 300" style="background: #1a4d2e; border: 2px solid #fff; border-radius: 4px; cursor: crosshair;"></svg>
            </div>
          </div>

          <!-- Sidebar -->
          <div>
            <div class="card" style="padding: 12px;">
              <h3 style="margin-top: 0; font-size: 14px;">Your Plays</h3>
              <div id="playbookSidebar" style="max-height: 800px; overflow-y: auto; font-size: 11px;"></div>
            </div>
          </div>
        </div>

        <div id="playbookList" style="margin-top: 24px;"></div>`;

      document.getElementById('playbook').innerHTML = html;
      resetTemplate();
      renderPlaybookList();
      renderPlaybookSidebar();
      setupFieldEditor();
    }

    function setupFieldEditor() {
      setTimeout(() => {
        const svg = document.getElementById('fieldEditor');
        if (!svg) return;
        svg.addEventListener('mousedown', handleFieldMouseDown);
        svg.addEventListener('mousemove', handleFieldMouseMove);
        svg.addEventListener('mouseup', handleFieldMouseUp);
      }, 50);
    }

    function handleFieldMouseDown(e) {
      if (drawMode) return;
      const svg = e.currentTarget;
      const rect = svg.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (520 / rect.width);
      const y = (e.clientY - rect.top) * (300 / rect.height);
      const circle = e.target;
      if (circle.classList && circle.classList.contains('player-circle')) {
        draggedPlayer = { element: circle, startX: x, startY: y, type: circle.dataset.type, index: parseInt(circle.dataset.index) };
      }
    }

    function handleFieldMouseMove(e) {
      if (!draggedPlayer || drawMode) return;
      const svg = e.currentTarget;
      const rect = svg.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (520 / rect.width);
      const y = (e.clientY - rect.top) * (300 / rect.height);
      if (draggedPlayer.type === 'offense') {
        currentPlayDiagram.offense[draggedPlayer.index] = { x, y };
      } else {
        currentPlayDiagram.defense[draggedPlayer.index] = { x, y };
      }
      renderField();
    }

    function handleFieldMouseUp(e) {
      draggedPlayer = null;
    }

    function resetTemplate() {
      const formation = document.getElementById('playForm')?.value || 'Wing-T';
      const template = formationTemplates[formation];
      currentPlayDiagram = JSON.parse(JSON.stringify(template || formationTemplates['Wing-T']));
      renderField();
    }

    function renderField() {
      const svg = document.getElementById('fieldEditor');
      if (!svg) return;

      const offenseCircles = currentPlayDiagram.offense.map((p, i) => 
        `<circle cx="${p.x}" cy="${p.y}" r="8" fill="#fff" stroke="#0066cc" stroke-width="2" class="player-circle" data-type="offense" data-index="${i}" style="cursor: grab;"/>`
      ).join('');

      const defenseCircles = currentPlayDiagram.defense.map((p, i) => 
        `<circle cx="${p.x}" cy="${p.y}" r="8" fill="none" stroke="#ff6b6b" stroke-width="2" class="player-circle" data-type="defense" data-index="${i}" style="cursor: grab;"/>`
      ).join('');

      const lines = (currentPlayDiagram.lines || []).map(line => {
        if (line.type === 'route') {
          const dx = line.x2 - line.x1, dy = line.y2 - line.y1;
          const len = Math.sqrt(dx*dx + dy*dy);
          const ux = len > 0 ? dx / len : 0, uy = len > 0 ? dy / len : 0;
          const ax = line.x2 - 6*ux, ay = line.y2 - 6*uy;
          return `<line x1="${line.x1}" y1="${line.y1}" x2="${ax}" y2="${ay}" stroke="#ffff00" stroke-width="2.5" stroke-linecap="round"/><polygon points="${line.x2},${line.y2} ${line.x2-6},${line.y2-3} ${line.x2-3},${line.y2-6}" fill="#ffff00"/>`;
        } else if (line.type === 'block') {
          const dx = line.x2 - line.x1, dy = line.y2 - line.y1;
          const len = Math.sqrt(dx*dx + dy*dy);
          const ux = len > 0 ? dx / len : 0, uy = len > 0 ? dy / len : 0;
          const px = -uy * 6, py = ux * 6;
          return `<line x1="${line.x1}" y1="${line.y1}" x2="${line.x2}" y2="${line.y2}" stroke="#00ff00" stroke-width="2.5" stroke-linecap="round"/><line x1="${line.x2 + px}" y1="${line.y2 + py}" x2="${line.x2 - px}" y2="${line.y2 - py}" stroke="#00ff00" stroke-width="2.5" stroke-linecap="round"/>`;
        } else if (line.type === 'motion') {
          const cpx = (line.x1 + line.x2) / 2, cpy = line.y1 - 15;
          return `<path d="M ${line.x1} ${line.y1} Q ${cpx} ${cpy} ${line.x2} ${line.y2}" stroke="#cc00ff" stroke-width="2.5" fill="none" stroke-dasharray="3,3" stroke-linecap="round"/><polygon points="${line.x2},${line.y2} ${line.x2-6},${line.y2-4} ${line.x2-4},${line.y2-6}" fill="#cc00ff"/>`;
        }
      }).join('');

      const fieldBase = `<line x1="20" y1="20" x2="20" y2="280" stroke="white" stroke-width="1.5"/><line x1="500" y1="20" x2="500" y2="280" stroke="white" stroke-width="1.5"/><line x1="60" y1="20" x2="60" y2="280" stroke="white" stroke-width="2"/><line x1="460" y1="20" x2="460" y2="280" stroke="white" stroke-width="2"/><line x1="260" y1="20" x2="260" y2="280" stroke="white" stroke-width="2" stroke-dasharray="4,4"/><line x1="100" y1="20" x2="100" y2="280" stroke="white" stroke-width="0.5"/><line x1="140" y1="20" x2="140" y2="280" stroke="white" stroke-width="0.5"/><line x1="180" y1="20" x2="180" y2="280" stroke="white" stroke-width="0.5"/><line x1="220" y1="20" x2="220" y2="280" stroke="white" stroke-width="0.5"/><line x1="300" y1="20" x2="300" y2="280" stroke="white" stroke-width="0.5"/><line x1="340" y1="20" x2="340" y2="280" stroke="white" stroke-width="0.5"/><line x1="380" y1="20" x2="380" y2="280" stroke="white" stroke-width="0.5"/><line x1="420" y1="20" x2="420" y2="280" stroke="white" stroke-width="0.5"/><text x="60" y="30" font-size="12" fill="white" font-weight="bold" text-anchor="middle">G</text><text x="100" y="30" font-size="10" fill="white" text-anchor="middle">10</text><text x="140" y="30" font-size="10" fill="white" text-anchor="middle">20</text><text x="180" y="30" font-size="10" fill="white" text-anchor="middle">30</text><text x="220" y="30" font-size="10" fill="white" text-anchor="middle">40</text><text x="260" y="30" font-size="12" fill="white" font-weight="bold" text-anchor="middle">50</text><text x="300" y="30" font-size="10" fill="white" text-anchor="middle">40</text><text x="340" y="30" font-size="10" fill="white" text-anchor="middle">30</text><text x="380" y="30" font-size="10" fill="white" text-anchor="middle">20</text><text x="420" y="30" font-size="10" fill="white" text-anchor="middle">10</text><text x="460" y="30" font-size="12" fill="white" font-weight="bold" text-anchor="middle">G</text><rect x="20" y="20" width="40" height="260" fill="none" stroke="white" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/><rect x="460" y="20" width="40" height="260" fill="none" stroke="white" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/>`;

      svg.innerHTML = fieldBase + lines + offenseCircles + defenseCircles;
      setupFieldEditor();
    }

    function setDrawMode(mode) {
      drawMode = drawMode === mode ? null : mode;
      document.getElementById('drawRoute').style.opacity = drawMode === 'route' ? '1' : '0.6';
      document.getElementById('drawBlock').style.opacity = drawMode === 'block' ? '1' : '0.6';
      document.getElementById('drawMotion').style.opacity = drawMode === 'motion' ? '1' : '0.6';

      const svg = document.getElementById('fieldEditor');
      if (svg) {
        if (drawMode) {
          let isDrawing = false, startX, startY;
          svg.onmousedown = (e) => {
            isDrawing = true;
            const rect = svg.getBoundingClientRect();
            startX = (e.clientX - rect.left) * (520 / rect.width);
            startY = (e.clientY - rect.top) * (300 / rect.height);
          };
          svg.onmouseup = (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            const rect = svg.getBoundingClientRect();
            const endX = (e.clientX - rect.left) * (520 / rect.width);
            const endY = (e.clientY - rect.top) * (300 / rect.height);
            if (Math.abs(endX - startX) > 5 || Math.abs(endY - startY) > 5) {
              currentPlayDiagram.lines.push({ type: drawMode, x1: startX, y1: startY, x2: endX, y2: endY });
            }
            renderField();
          };
        } else {
          svg.onmousedown = handleFieldMouseDown;
          svg.onmouseup = handleFieldMouseUp;
        }
      }
    }

    function addOffensePlayer() {
      currentPlayDiagram.offense.push({ x: 140, y: Math.random() * 200 + 50 });
      renderField();
    }

    function addDefensePlayer() {
      currentPlayDiagram.defense.push({ x: 320, y: Math.random() * 200 + 50 });
      renderField();
    }

    function undoLine() {
      if (currentPlayDiagram.lines && currentPlayDiagram.lines.length > 0) {
        currentPlayDiagram.lines.pop();
        renderField();
      }
    }

    function flipField() {
      currentPlayDiagram.offense = currentPlayDiagram.offense.map(p => ({ x: 520 - p.x, y: p.y }));
      currentPlayDiagram.defense = currentPlayDiagram.defense.map(p => ({ x: 520 - p.x, y: p.y }));
      currentPlayDiagram.lines = currentPlayDiagram.lines.map(line => ({
        type: line.type,
        x1: 520 - line.x1,
        y1: line.y1,
        x2: 520 - line.x2,
        y2: line.y2
      }));
      renderField();
    }

    function saveNewPlay() {
      const name = document.getElementById('playName').value.trim();
      if (!name) return alert('Enter play name');

      const team = appData.teams[activeTeam];
      if (!team) return alert('Team not found');
      if (!team.playbook) team.playbook = [];

      team.playbook.push({
        id: Date.now().toString(),
        name,
        category: document.getElementById('playCategory').value,
        formation: document.getElementById('playForm').value,
        description: document.getElementById('playDesc').value,
        diagram: JSON.parse(JSON.stringify(currentPlayDiagram))
      });
      saveData();
      document.getElementById('playName').value = '';
      document.getElementById('playDesc').value = '';
      resetTemplate();
      renderPlaybookList();
      renderPlaybookSidebar();
      alert('Play saved!');
    }

    function renderPlaybookList() {
      const team = appData.teams[activeTeam];
      if (!team) return;
      if (!team.playbook) team.playbook = [];
      
      let html = '<h2 style="margin-top: 24px;">Saved Plays</h2>';
      if (team.playbook.length === 0) {
        html += '<div class="empty-state">No plays yet</div>';
        document.getElementById('playbookList').innerHTML = html;
        return;
      }

      html += '<div style="display: grid; gap: 12px;">';
      team.playbook.forEach(p => {
        html += `<div class="card" style="border-left: 4px solid #0066cc;">
          <div style="font-weight: 600;">${p.name}</div>
          <div style="font-size: 12px; color: #999; margin-bottom: 8px;">${p.category || 'Offensive'} • ${p.formation}</div>
          ${p.description ? `<div style="font-size: 12px; color: #666; margin-bottom: 8px;">${p.description}</div>` : ''}
          ${p.diagram ? `<svg width="100%" height="150" viewBox="0 0 520 300" style="background: #1a4d2e; border-radius: 4px; margin-bottom: 8px;">
            <line x1="60" y1="20" x2="60" y2="280" stroke="white" stroke-width="1.5"/><line x1="460" y1="20" x2="460" y2="280" stroke="white" stroke-width="1.5"/><line x1="260" y1="20" x2="260" y2="280" stroke="white" stroke-width="1.5" stroke-dasharray="3,3"/>
            ${p.diagram.offense.map(c => `<circle cx="${c.x}" cy="${c.y}" r="6" fill="#fff" stroke="#0066cc" stroke-width="1.5"/>`).join('')}
            ${p.diagram.defense.map(c => `<circle cx="${c.x}" cy="${c.y}" r="6" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>`).join('')}
            ${(p.diagram.lines || []).map(line => { if (line.type === 'route') return `<line x1="${line.x1}" y1="${line.y1}" x2="${line.x2}" y2="${line.y2}" stroke="#ffff00" stroke-width="1.5"/>`; else if (line.type === 'block') return `<line x1="${line.x1}" y1="${line.y1}" x2="${line.x2}" y2="${line.y2}" stroke="#00ff00" stroke-width="1.5"/>`; else if (line.type === 'motion') { const cpx = (line.x1 + line.x2) / 2; const cpy = line.y1 - 10; return `<path d="M ${line.x1} ${line.y1} Q ${cpx} ${cpy} ${line.x2} ${line.y2}" stroke="#cc00ff" stroke-width="1.5" fill="none" stroke-dasharray="2,2"/>`;} }).join('')}
          </svg>` : ''}
          <button class="btn btn-danger btn-small" onclick="removePlay('${p.id}')" style="width: 100%;">Delete</button>
        </div>`;
      });
      html += '</div>';
      document.getElementById('playbookList').innerHTML = html;
    }

    function renderPlaybookSidebar() {
      const team = appData.teams[activeTeam];
      const sidebar = document.getElementById('playbookSidebar');
      if (!team || !sidebar) return;
      if (!team.playbook) team.playbook = [];

      const categories = {};
      team.playbook.forEach(p => {
        const cat = p.category || 'Other';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(p);
      });

      let html = '';
      if (team.playbook.length === 0) {
        html = '<div style="color: #999; text-align: center; padding: 12px;">No plays yet</div>';
      } else {
        Object.keys(categories).sort().forEach(cat => {
          html += `<div style="margin-bottom: 12px;">
            <div style="font-size: 10px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 6px; padding: 0 4px;">${cat}</div>
            <div style="display: grid; gap: 3px;">`;
          categories[cat].forEach(p => {
            html += `<div style="padding: 6px 8px; background: #f0f0f0; border-radius: 3px; border-left: 2px solid #0066cc; cursor: pointer; font-size: 10px; font-weight: 500;" title="${p.description || ''}">
              ${p.name}<br><span style="opacity: 0.6;">${p.formation}</span>
            </div>`;
          });
          html += `</div></div>`;
        });
      }
      sidebar.innerHTML = html;
    }

    function removePlay(id) {
      const team = appData.teams[activeTeam];
      if (!team || !team.playbook) return;
      team.playbook = team.playbook.filter(p => p.id !== id);
      saveData();
      renderPlaybookList();
      renderPlaybookSidebar();
    }

    function renderGameDay() {
      const team = appData.teams[activeTeam];
      let html = `<h2>Game Day Tracker</h2>`;

      if (!currentGame) {
        html += `<div class="card" style="background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; padding: 24px;">
          <h3 style="color: white; margin-top: 0;">Start New Game</h3>
          <div class="form-group">
            <input type="text" id="gameTitle" class="input" placeholder="Opponent name" style="margin-bottom: 8px;">
            <input type="date" id="gameDate" class="input" value="${new Date().toISOString().split('T')[0]}" style="margin-bottom: 12px;">
            <button class="btn btn-success" onclick="startGame()" style="width: 100%;">Start Game</button>
          </div>
        </div>`;

        if (team.games.length > 0) {
          html += '<h3 style="margin-top: 24px;">Game History</h3><div class="player-list">';
          team.games.forEach(g => {
            html += `<div class="player-item" style="grid-template-columns: 1fr auto;">
              <div><strong>${g.title}</strong><br><small style="color: #999;">${g.date}</small></div>
              <div style="text-align: right; font-weight: 600; font-size: 18px;">${g.finalScore || '—'}</div>
            </div>`;
          });
          html += '</div>';
        }
      } else {
        // SCOREBOARD
        html += `
          <div style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 24px; border-radius: 8px; margin-bottom: 20px; color: white;">
            <!-- Score Header -->
            <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: center; margin-bottom: 24px;">
              <div>
                <div style="font-size: 12px; opacity: 0.8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;">YOUR TEAM</div>
                <div style="font-size: 64px; font-weight: 800; line-height: 1;">${currentGame.yourScore || 0}</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: 14px; opacity: 0.9; margin-bottom: 8px; font-weight: 600;">${currentGame.quarter}</div>
                <div style="font-size: 48px; font-weight: 700; color: #ffd700;">⚡</div>
              </div>
              <div style="text-align: right;">
                <div style="font-size: 12px; opacity: 0.8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;">OPP</div>
                <div style="font-size: 64px; font-weight: 800; line-height: 1;">${currentGame.oppScore || 0}</div>
              </div>
            </div>

            <!-- Quick Stats -->
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; font-size: 12px;">
              <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 4px; text-align: center;">
                <div style="opacity: 0.8;">Possessions</div>
                <div style="font-size: 20px; font-weight: 700;">${currentGame.possessions || 0}</div>
              </div>
              <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 4px; text-align: center;">
                <div style="opacity: 0.8;">Plays Run</div>
                <div style="font-size: 20px; font-weight: 700;">${(currentGame.plays || []).length}</div>
              </div>
              <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 4px; text-align: center;">
                <div style="opacity: 0.8;">On Field</div>
                <div style="font-size: 20px; font-weight: 700;">${currentGame.onField?.length || 0}</div>
              </div>
            </div>

            <!-- Score Buttons -->
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px;">
              <button class="btn" onclick="scorePlay(6)" style="background: #28a745; font-size: 16px; padding: 16px 8px; font-weight: 700;">+6 TD</button>
              <button class="btn" onclick="scorePlay(1)" style="background: #17a2b8; font-size: 14px; padding: 16px 8px; font-weight: 700;">+1 Conv</button>
              <button class="btn" onclick="scorePlay(2)" style="background: #20c997; font-size: 14px; padding: 16px 8px; font-weight: 700;">+2 Conv</button>
            </div>

            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
              <button class="btn" onclick="scorePlay(2)" style="background: #ffc107; color: #333; font-size: 14px; padding: 16px 8px; font-weight: 700;">+2 Safety</button>
              <button class="btn" onclick="nextQuarter()" style="background: #007bff; font-size: 14px; padding: 16px 8px; font-weight: 700;">Next Q</button>
              <button class="btn" onclick="undoScore()" style="background: #6c757d; font-size: 14px; padding: 16px 8px; font-weight: 700;">Undo</button>
            </div>
          </div>

          <!-- Play Log -->
          <div class="card">
            <h3>Play Log</h3>
            <div style="max-height: 200px; overflow-y: auto; font-size: 12px;">
              ${(currentGame.plays || []).length === 0 ? '<div style="color: #999;">No plays logged</div>' : ''}
              ${(currentGame.plays || []).slice().reverse().map((p, i) => `
                <div style="padding: 8px; background: #f9f9f9; border-radius: 4px; margin-bottom: 4px; display: grid; grid-template-columns: 1fr auto;">
                  <div><strong>+${p.points}</strong> pts (${p.quarter})</div>
                  <div style="color: #999;">${new Date(p.time).toLocaleTimeString()}</div>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- Active Players -->
          <div class="card" style="margin-top: 16px;">
            <h3>Players On Field (${currentGame.onField?.length || 0})</h3>
            <div style="display: flex; flex-wrap: wrap; gap: 8px;">
              ${team.players.length === 0 ? '<div style="color: #999; font-size: 12px;">Add players to roster first</div>' : ''}
              ${team.players.map(p => {
                const isOnField = currentGame.onField?.includes(p.id);
                return `<button class="player-chip" onclick="togglePlayer('${p.id}')" style="background: ${isOnField ? '#28a745' : '#e9ecef'}; color: ${isOnField ? 'white' : '#333'}; cursor: pointer; border: 2px solid ${isOnField ? '#28a745' : '#ddd'}; padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;">
                  #${p.number}  ${p.name}
                </button>`;
              }).join('')}
            </div>
          </div>

          <!-- Touches Tracker -->
          <div class="card" style="margin-top: 16px;">
            <h3>Touches This Game</h3>
            <div style="display: grid; gap: 4px; max-height: 200px; overflow-y: auto;">
              ${team.players.length === 0 ? '<div style="color: #999; font-size: 12px;">No players on roster</div>' : ''}
              ${team.players.filter(p => (currentGame.touches?.[p.id] || 0) > 0).sort((a, b) => (currentGame.touches?.[b.id] || 0) - (currentGame.touches?.[a.id] || 0)).map(p => `
                <div style="padding: 10px; background: #f9f9f9; border-radius: 4px; display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center;">
                  <div><strong>#${p.number}  ${p.name}</strong></div>
                  <div style="font-weight: 600; color: #0066cc;">${currentGame.touches?.[p.id] || 0} touches</div>
                  <button class="btn btn-secondary btn-small" onclick="addTouch('${p.id}')">+1</button>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- End Game -->
          <button class="btn btn-danger" onclick="endGame()" style="width: 100%; margin-top: 16px; padding: 12px;">End Game</button>
        `;
      }

      document.getElementById('gameday').innerHTML = html;
    }

    function startGame() {
      const title = document.getElementById('gameTitle').value.trim();
      if (!title) return alert('Enter opponent name');
      
      const team = appData.teams[activeTeam];
      if (team.players.length === 0) return alert('Add players to roster first');

      currentGame = {
        id: Date.now().toString(),
        title,
        date: document.getElementById('gameDate').value,
        quarter: 'Q1',
        yourScore: 0,
        oppScore: 0,
        possessions: 0,
        plays: [],
        touches: {},
        onField: [],
        subs: []
      };
      saveData();
      renderGameDay();
    }

    function scorePlay(points) {
      if (!currentGame) return;
      currentGame.yourScore += points;
      currentGame.plays.push({
        points,
        quarter: currentGame.quarter,
        time: Date.now()
      });
      saveData();
      renderGameDay();
    }

    function undoScore() {
      if (!currentGame || currentGame.plays.length === 0) return;
      const lastPlay = currentGame.plays.pop();
      currentGame.yourScore -= lastPlay.points;
      saveData();
      renderGameDay();
    }

    function nextQuarter() {
      if (!currentGame) return;
      const quarters = ['Q1', 'Q2', 'Q3', 'Q4'];
      const idx = quarters.indexOf(currentGame.quarter);
      if (idx < 3) {
        currentGame.quarter = quarters[idx + 1];
        currentGame.possessions = 0;
        saveData();
        renderGameDay();
      }
    }

    function togglePlayer(id) {
      if (!currentGame) return;
      if (!currentGame.onField) currentGame.onField = [];
      if (currentGame.onField.includes(id)) {
        currentGame.onField = currentGame.onField.filter(pid => pid !== id);
      } else {
        currentGame.onField.push(id);
      }
      saveData();
      renderGameDay();
    }

    function addTouch(playerId) {
      if (!currentGame) return;
      if (!currentGame.touches) currentGame.touches = {};
      currentGame.touches[playerId] = (currentGame.touches[playerId] || 0) + 1;
      saveData();
      renderGameDay();
    }

    function endGame() {
      if (!currentGame) return;
      const finalScore = `${currentGame.yourScore}–${currentGame.oppScore || 0}`;
      currentGame.finalScore = finalScore;
      appData.teams[activeTeam].games.push(currentGame);
      saveData();
      currentGame = null;
      renderGameDay();
      alert('Game saved!');
    }

    init();
  </script>
</body>
</html>
