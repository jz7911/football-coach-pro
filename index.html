<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flag Football Coach Pro</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #fafafa;
      color: #333;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
    h1 { margin: 0 0 16px 0; font-size: 32px; font-weight: 700; }
    h2 { font-size: 24px; font-weight: 600; margin-bottom: 20px; margin-top: 0; }
    h3 { font-size: 16px; font-weight: 600; margin: 0 0 12px 0; }
    .header { margin-bottom: 24px; border-bottom: 1px solid #ddd; padding-bottom: 16px; }
    .team-buttons { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .team-btn { padding: 10px 16px; border: 0.5px solid #ccc; border-radius: 6px; background: white; color: #333; cursor: pointer; font-weight: 500; font-size: 14px; }
    .team-btn.active { border: 2px solid #333; background: #333; color: white; }
    .tab-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; }
    .tab-btn { padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 4px; background: #f5f5f5; color: #333; cursor: pointer; font-size: 12px; font-weight: 400; }
    .tab-btn.active { border: 1px solid #333; background: #333; color: white; font-weight: 600; }
    .view { display: none; }
    .view.active { display: block; }
    .form-group { display: grid; gap: 8px; margin-bottom: 12px; }
    .input, select, textarea { padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 4px; font-size: 14px; font-family: inherit; }
    textarea { min-height: 100px; resize: vertical; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-primary { background: #333; color: white; }
    .btn-success { background: #28a745; color: white; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-small { padding: 4px 8px; font-size: 12px; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-edit { background: #0066cc; color: white; }
    .btn-secondary { background: #6c757d; color: white; }
    .card { background: white; padding: 16px; border-radius: 8px; border: 0.5px solid #ddd; margin-bottom: 12px; }
    .stat-card { padding: 16px; background: white; border: 0.5px solid #ddd; border-radius: 8px; text-align: center; }
    .stat-label { font-size: 12px; color: #999; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; color: #333; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .player-list { display: grid; gap: 8px; }
    .player-item { padding: 12px; background: white; border: 0.5px solid #ddd; border-radius: 6px; display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 12px; align-items: center; }
    .player-name { font-weight: 600; font-size: 14px; }
    .stat-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; font-size: 12px; }
    .eval-section { margin-bottom: 24px; }
    .star-rating { display: flex; gap: 4px; }
    .star-btn { width: 32px; height: 32px; border: 0.5px solid #ccc; border-radius: 4px; background: #f5f5f5; cursor: pointer; font-size: 14px; font-weight: 600; }
    .star-btn.filled { background: #ffc107; }
    .empty-state { text-align: center; padding: 40px; color: #999; background: white; border-radius: 8px; border: 0.5px solid #ddd; }
    .practice-week { padding: 12px; background: #f0f8ff; border-left: 4px solid #0066cc; border-radius: 4px; margin-bottom: 8px; cursor: pointer; }
    .practice-week:hover { background: #e0f0ff; }
    .drill-item { padding: 8px 12px; background: #f9f9f9; border: 0.5px solid #ddd; border-radius: 4px; margin-bottom: 8px; }
    .game-banner { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; margin-bottom: 16px; }
    .game-score { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; margin-bottom: 12px; text-align: center; }
    .score-board { font-size: 48px; font-weight: 700; }
    .quarter-info { background: white; color: #333; padding: 8px 16px; border-radius: 4px; font-weight: 600; }
    .field-svg { width: 100%; max-width: 600px; height: auto; border: 3px solid #333; border-radius: 8px; display: block; margin: 16px auto; cursor: crosshair; background: #2d5016; }
    .player-circle { cursor: grab; }
    .player-circle:active { cursor: grabbing; }
    .field-tools { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin: 12px 0; }
    .field-controls { background: #f0f8ff; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
    .player-chip { padding: 6px 12px; background: #e3f2fd; border: 1px solid #2196f3; border-radius: 20px; font-size: 12px; font-weight: 500; display: inline-block; margin-right: 8px; margin-bottom: 4px; cursor: pointer; }
    .player-chip.offense { background: #0066cc; color: white; border-color: #0066cc; }
    .player-chip.defense { background: #dc3545; color: white; border-color: #dc3545; }
    .sub-history { background: #f9f9f9; padding: 12px; border-radius: 4px; margin: 8px 0; font-size: 12px; }
    .sub-time { color: #999; font-size: 11px; margin-bottom: 2px; }
    .sub-change { display: flex; justify-content: space-between; align-items: center; }
    .sub-out { color: #d32f2f; font-weight: 500; }
    .sub-in { color: #388e3c; font-weight: 500; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 24px; border-radius: 8px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-close { float: right; cursor: pointer; font-size: 24px; }
    .play-diagram { background: #f9f9f9; border: 0.5px solid #ddd; border-radius: 8px; padding: 12px; margin: 8px 0; }
    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
      .player-item { grid-template-columns: 1fr; }
      .stat-inputs { grid-template-columns: repeat(2, 1fr); }
      .game-score { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .container { padding: 12px; }
      h1 { font-size: 24px; margin-bottom: 12px; }
      h2 { font-size: 18px; }
      .stat-inputs { grid-template-columns: 1fr; }
      .player-item { grid-template-columns: 1fr; }
      .score-board { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏈  Flag Football Coach Pro</h1>
      <div class="team-buttons">
        <button class="team-btn active" data-team="5-6">5/6 Division</button>
        <button class="team-btn" data-team="7-8">7/8 Division</button>
      </div>
      <div class="tab-buttons">
        <button class="tab-btn active" data-view="home">📊  Dashboard</button>
        <button class="tab-btn" data-view="roster">👥  Roster</button>
        <button class="tab-btn" data-view="evals">⭐  Evals</button>
        <button class="tab-btn" data-view="practice">📋  Practices</button>
        <button class="tab-btn" data-view="playbook">📖  Playbook</button>
        <button class="tab-btn" data-view="gameday">🎮  Game</button>
      </div>
    </div>

    <div id="home" class="view active"></div>
    <div id="roster" class="view"></div>
    <div id="evals" class="view"></div>
    <div id="practice" class="view"></div>
    <div id="playbook" class="view"></div>
    <div id="gameday" class="view"></div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <h3>Edit Player</h3>
      <div class="form-group">
        <input type="text" id="editName" class="input" placeholder="Player name">
        <input type="text" id="editNumber" class="input" placeholder="Jersey #">
        <button class="btn btn-primary" onclick="savePlayerEdit()">Save</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let activeTeam = '5-6';
    let activeView = 'home';
    let editingPlayerId = null;
    let currentGame = null;
    let appData = {
      teams: {
        '5-6': { name: '5/6 Division', players: [], practices: [], playbook: [], games: [], evals: {} },
        '7-8': { name: '7/8 Division', players: [], practices: [], playbook: [], games: [], evals: {} }
      }
    };

    const drills = ['Teamwork', 'High Knees', 'Butt Kicks', 'Gear Runs', 'Log Roll Bonanza', 'Meet in the Middle Grip Drill', 'Catch and Step with Partner', 'Hot Potato', 'Snake Run', 'Zig-zag Pathway', 'Position Tag', 'Multi-Directional Get Up and Go', 'Learning to Fall', 'Tag Games', 'Sharks and Minnows', 'Partner Mirror Drill', 'Throw and Catch Relay', 'Acceleration Drills', 'No-Step Kick Drill', 'Contact Dots Drill', 'Lateral Shuffle', 'Animal Relay', 'Balance Kicks', 'Partner Kicks'];

    const preBuiltWeeks = [
      { week: 'Week 1', title: 'Foundations', drills: ['Teamwork', 'High Knees', 'Gear Runs', 'Meet in the Middle Grip Drill', 'Catch and Step with Partner'] },
      { week: 'Week 2', title: 'Running & Receiving', drills: ['Teamwork', 'Butt Kicks', 'Zig-zag Pathway', 'Hot Potato', 'Snake Run'] },
      { week: 'Week 3', title: 'Kicking & Contact', drills: ['Teamwork', 'Lateral Shuffle', 'Balance Kicks', 'Learning to Fall', 'Tag Games'] },
      { week: 'Week 4', title: 'Offensive Skills', drills: ['Teamwork', 'Gear Runs', 'Meet in the Middle Grip Drill', 'Partner Mirror Drill', 'Sharks and Minnows'] },
      { week: 'Week 5', title: 'Defensive Drills', drills: ['Teamwork', 'Multi-Directional Get Up and Go', 'Snake Run', 'Throw and Catch Relay', 'Position Tag'] },
      { week: 'Week 6', title: 'Integrated Offense', drills: ['Teamwork', 'High Knees', 'Meet in the Middle Grip Drill', 'Throw and Catch Relay', 'Zig-zag Pathway'] },
      { week: 'Week 7', title: 'Mid-Season Review', drills: ['Teamwork', 'Gear Runs', 'Acceleration Drills', 'Hot Potato', 'Tag Games'] },
      { week: 'Week 8', title: 'Contact & Tackling', drills: ['Teamwork', 'Log Roll Bonanza', 'Learning to Fall', 'Animal Relay', 'Tag Games'] },
      { week: 'Week 9', title: 'Complex Patterns', drills: ['Teamwork', 'Catch and Step with Partner', 'Snake Run', 'Partner Mirror Drill', 'Sharks and Minnows'] },
      { week: 'Week 10', title: 'Endurance & Pace', drills: ['Teamwork', 'Gear Runs', 'Hot Potato', 'Tag Games', 'Throw and Catch Relay'] },
      { week: 'Week 11', title: 'Playoff Prep', drills: ['Teamwork', 'Meet in the Middle Grip Drill', 'High Knees', 'Zig-zag Pathway', 'Tag Games'] },
      { week: 'Week 12', title: 'Championship Focus', drills: ['Teamwork', 'Acceleration Drills', 'Partner Mirror Drill', 'Hot Potato', 'Sharks and Minnows'] }
    ];

    let currentPlayDiagram = { offense: [], defense: [], lines: [] };
    let draggingElement = null;
    let dragOffset = { x: 0, y: 0 };
    let drawMode = null;
    let isDrawing = false;
    let startPoint = null;

    function init() {
      loadData();
      setupEventListeners();
      renderView();
    }

    function loadData() {
      const saved = localStorage.getItem('football-coach-pro');
      if (saved) appData = JSON.parse(saved);
    }

    function saveData() {
      localStorage.setItem('football-coach-pro', JSON.stringify(appData));
    }

    function setupEventListeners() {
      document.querySelectorAll('.team-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          activeTeam = e.target.dataset.team;
          document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          currentGame = null;
          renderView();
        });
      });

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          activeView = e.target.dataset.view;
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          renderView();
        });
      });
    }

    function renderView() {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const viewEl = document.getElementById(activeView);
      viewEl.classList.add('active');

      if (activeView === 'home') renderHome();
      else if (activeView === 'roster') renderRoster();
      else if (activeView === 'evals') renderEvals();
      else if (activeView === 'practice') renderPractice();
      else if (activeView === 'playbook') renderPlaybook();
      else if (activeView === 'gameday') renderGameDay();
    }

    function renderHome() {
      const team = appData.teams[activeTeam];
      const avgRating = team.players.length > 0
        ? (team.players.reduce((sum, p) => sum + (appData.teams[activeTeam].evals[p.id]?.overall || 0), 0) / team.players.length).toFixed(1)
        : 0;

      let html = `<h2>Team Dashboard: ${team.name}</h2>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">Players</div><div class="stat-value">${team.players.length}</div></div>
          <div class="stat-card"><div class="stat-label">Avg Rating</div><div class="stat-value">${avgRating}</div></div>
          <div class="stat-card"><div class="stat-label">Practices</div><div class="stat-value">${team.practices.length}</div></div>
          <div class="stat-card"><div class="stat-label">Plays</div><div class="stat-value">${team.playbook.length}</div></div>
          <div class="stat-card"><div class="stat-label">Games</div><div class="stat-value">${team.games.length}</div></div>
        </div>`;

      if (team.players.length > 0) {
        const topPlayers = team.players
          .map(p => ({ ...p, rating: appData.teams[activeTeam].evals[p.id]?.overall || 0 }))
          .sort((a, b) => b.rating - a.rating)
          .slice(0, 5);

        html += `<div class="grid-2">
          <div class="card"><h3>Quick Start</h3>
            <ul style="margin: 0; padding-left: 20px; font-size: 14px; line-height: 2;">
              <li>Add players to roster</li>
              <li>Rate players with evaluations</li>
              <li>Build 12-week practice schedule</li>
              <li>Create and visualize plays</li>
              <li>Track game substitutions & stats</li>
            </ul>
          </div>
          <div class="card"><h3>Top Rated Players</h3>
            ${topPlayers.map(p => `<div style="display: flex; justify-content: space-between; padding-bottom: 6px; border-bottom: 0.5px solid #eee; font-size: 13px;">
              <span>#${p.number}  ${p.name}</span>
              <span style="font-weight: 600;">⭐  ${p.rating.toFixed(1)}</span>
            </div>`).join('')}
          </div>
        </div>`;
      }

      document.getElementById('home').innerHTML = html;
    }

    function renderRoster() {
      const team = appData.teams[activeTeam];
      let html = `<h2>Manage Roster</h2>
        <div class="card" style="background: #f0f8ff; border-left: 4px solid #0066cc;">
          <h3>Add New Player</h3>
          <div class="form-group" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));">
            <input type="text" id="playerName" class="input" placeholder="Player name">
            <input type="text" id="playerNumber" class="input" placeholder="Jersey #">
            <button class="btn btn-primary" onclick="addPlayer()">Add Player</button>
          </div>
        </div>`;

      if (team.players.length === 0) {
        html += '<div class="empty-state">No players yet.  Add your first player above.</div>';
      } else {
        html += `<div class="player-list">`;
        team.players.forEach(p => {
          const rating = appData.teams[activeTeam].evals[p.id]?.overall || '—';
          html += `<div class="player-item">
            <div>
              <div class="player-name">#${p.number}  ${p.name}</div>
              <div style="font-size: 11px; color: #999;">Rating: ⭐ ${rating}</div>
            </div>
            <div class="stat-inputs">
              <div><div style="color: #999; font-size: 11px;">Touches</div>
                <input type="number" value="${p.stats?.touches || 0}" style="width: 100%; padding: 4px;" onchange="updatePlayerStat('${p.id}', 'touches', this.value)">
              </div>
              <div><div style="color: #999; font-size: 11px;">TDs</div>
                <input type="number" value="${p.stats?.touchdowns || 0}" style="width: 100%; padding: 4px;" onchange="updatePlayerStat('${p.id}', 'touchdowns', this.value)">
              </div>
              <div><div style="color: #999; font-size: 11px;">DEF</div>
                <input type="number" value="${p.stats?.defensiveStops || 0}" style="width: 100%; padding: 4px;" onchange="updatePlayerStat('${p.id}', 'defensiveStops', this.value)">
              </div>
              <div><div style="color: #999; font-size: 11px;">Games</div>
                <input type="number" value="${p.stats?.played || 0}" style="width: 100%; padding: 4px;" onchange="updatePlayerStat('${p.id}', 'played', this.value)">
              </div>
            </div>
            <button class="btn-edit btn-small" onclick="openEditModal('${p.id}')">Edit</button>
            <button class="btn-danger btn-small" onclick="removePlayer('${p.id}')">Remove</button>
          </div>`;
        });
        html += '</div>';
      }

      document.getElementById('roster').innerHTML = html;
    }

    function openEditModal(id) {
      editingPlayerId = id;
      const player = appData.teams[activeTeam].players.find(p => p.id === id);
      document.getElementById('editName').value = player.name;
      document.getElementById('editNumber').value = player.number;
      document.getElementById('editModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
      editingPlayerId = null;
    }

    function savePlayerEdit() {
      if (editingPlayerId) {
        const player = appData.teams[activeTeam].players.find(p => p.id === editingPlayerId);
        player.name = document.getElementById('editName').value.trim();
        player.number = document.getElementById('editNumber').value;
        saveData();
        closeModal();
        renderRoster();
      }
    }

    function addPlayer() {
      const name = document.getElementById('playerName').value.trim();
      const number = document.getElementById('playerNumber').value || '0';

      if (name) {
        const newPlayer = {
          id: Date.now().toString(),
          name,
          number,
          stats: { played: 0, touchdowns: 0, touches: 0, defensiveStops: 0 }
        };
        appData.teams[activeTeam].players.push(newPlayer);
        saveData();
        document.getElementById('playerName').value = '';
        document.getElementById('playerNumber').value = '';
        renderRoster();
      }
    }

    function removePlayer(id) {
      appData.teams[activeTeam].players = appData.teams[activeTeam].players.filter(p => p.id !== id);
      saveData();
      renderRoster();
    }

    function updatePlayerStat(id, stat, value) {
      const player = appData.teams[activeTeam].players.find(p => p.id === id);
      if (player) {
        player.stats[stat] = parseInt(value) || 0;
        saveData();
      }
    }

    function renderEvals() {
      const team = appData.teams[activeTeam];
      if (team.players.length === 0) {
        document.getElementById('evals').innerHTML = '<h2>Player Evaluations</h2><div style="color: #999; margin-top: 20px;">Add players first</div>';
        return;
      }

      const selectedId = team.players[0].id;
      const player = team.players[0];
      const eval = appData.teams[activeTeam].evals[selectedId] || {};

      let html = `<h2>Player Evaluations</h2>
        <div class="grid-2">
          <div>
            <h3>Select Player</h3>
            <div style="display: grid; gap: 6px; max-height: 500px; overflow-y: auto;">`;

      team.players.forEach(p => {
        html += `<button class="btn" style="background: #333; color: white; text-align: left;" onclick="selectPlayer('${p.id}')">#${p.number}  ${p.name}</button>`;
      });

      html += `</div></div>
        <div class="card" id="evalForm"></div>
        </div>`;

      document.getElementById('evals').innerHTML = html;
      renderEvalForm(player, eval, selectedId);
    }

    function selectPlayer(id) {
      const player = appData.teams[activeTeam].players.find(p => p.id === id);
      const eval = appData.teams[activeTeam].evals[id] || {};
      renderEvalForm(player, eval, id);
    }

    function renderEvalForm(player, eval, id) {
      const skills = [
        { key: 'passing', label: 'Passing' },
        { key: 'receiving', label: 'Receiving' },
        { key: 'running', label: 'Running' },
        { key: 'defense', label: 'Defense' },
        { key: 'fieldAwareness', label: 'Field Awareness' },
        { key: 'attitude', label: 'Attitude/Effort' }
      ];

      let html = `<h3>${player.name}  <span style="color: #ffc107; font-size: 20px;">⭐  ${eval.overall || 0}</span></h3>
        <div class="eval-section">`;

      skills.forEach(s => {
        html += `<div style="margin-bottom: 16px;">
          <label style="font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px;">${s.label}: ${eval[s.key] || 0}/5</label>
          <div class="star-rating">`;
        for (let i = 1; i <= 5; i++) {
          const filled = eval[s.key] >= i ? 'filled' : '';
          html += `<button class="star-btn ${filled}" onclick="rateSkill('${id}', '${s.key}', ${i})">★</button>`;
        }
        html += `</div></div>`;
      });

      html += `<div>
        <label style="font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px;">Notes</label>
        <textarea class="input" placeholder="Add coaching notes..." onchange="updateNotes('${id}', this.value)">${eval.notes || ''}</textarea>
      </div></div>`;

      document.getElementById('evalForm').innerHTML = html;
    }

    function rateSkill(id, skill, value) {
      if (!appData.teams[activeTeam].evals[id]) appData.teams[activeTeam].evals[id] = {};
      appData.teams[activeTeam].evals[id][skill] = value;

      const skills = ['passing', 'receiving', 'running', 'defense', 'fieldAwareness', 'attitude'];
      const ratings = skills.map(s => appData.teams[activeTeam].evals[id][s] || 0);
      appData.teams[activeTeam].evals[id].overall = (ratings.reduce((a, b) => a + b, 0) / skills.length).toFixed(1);
      saveData();

      const player = appData.teams[activeTeam].players.find(p => p.id === id);
      renderEvalForm(player, appData.teams[activeTeam].evals[id], id);
    }

    function updateNotes(id, notes) {
      if (!appData.teams[activeTeam].evals[id]) appData.teams[activeTeam].evals[id] = {};
      appData.teams[activeTeam].evals[id].notes = notes;
      saveData();
    }

    let currentPracticeDrills = [];

    function renderPractice() {
      const team = appData.teams[activeTeam];
      let html = `<h2>Practice Plan Builder</h2>
        <div class="grid-2">
          <div>
            <h3>Build Custom Practice</h3>
            <div class="card" style="background: #f0f8ff;">

    function setDrawMode(mode) {
      drawMode = drawMode === mode ? null : mode;
      document.getElementById('drawRoute').style.opacity = drawMode === 'route' ? '1' : '0.6';
      document.getElementById('drawBlock').style.opacity = drawMode === 'block' ? '1' : '0.6';
      document.getElementById('drawMotion').style.opacity = drawMode === 'motion' ? '1' : '0.6';
    }

    function undoLine() {
      if (currentPlayDiagram.lines && currentPlayDiagram.lines.length > 0) {
        currentPlayDiagram.lines.pop();
        renderField();
      }
    }

    function flipField() {
      // Mirror all players and lines horizontally
      currentPlayDiagram.offense = currentPlayDiagram.offense.map(p => ({ x: 520 - p.x, y: p.y }));
      currentPlayDiagram.defense = currentPlayDiagram.defense.map(p => ({ x: 520 - p.x, y: p.y }));
      currentPlayDiagram.lines = currentPlayDiagram.lines.map(line => ({
        type: line.type,
        x1: 520 - line.x1,
        y1: line.y1,
        x2: 520 - line.x2,
        y2: line.y2
      }));
      renderField();
    }

    function resetTemplate() {
      currentPlayDiagram = {
        offense: [
          { x: 140, y: 120 },
          { x: 140, y: 150 },
          { x: 180, y: 100 },
          { x: 180, y: 150 },
          { x: 200, y: 135 }
        ],
        defense: [
          { x: 280, y: 110 },
          { x: 280, y: 160 },
          { x: 320, y: 135 }
        ],
        lines: []
      };
      renderField();
    }

    function addOffensePlayer(x, y) {
      currentPlayDiagram.offense.push({ x, y });
      renderField();
    }

    function addDefensePlayer(x, y) {
      currentPlayDiagram.defense.push({ x, y });
      renderField();
    }

    function clearField() {
      currentPlayDiagram = { offense: [], defense: [], lines: [] };
      renderField();
    }

    function renderField() {
      const svg = document.getElementById('fieldEditor');
      if (!svg) return;

      const offenseCircles = currentPlayDiagram.offense.map((p, i) => `<circle cx="${p.x}" cy="${p.y}" r="10" fill="#fff" stroke="#0066cc" stroke-width="2" class="player-circle" data-type="offense" data-index="${i}"/>`).join('');
      
      const defenseCircles = currentPlayDiagram.defense.map((p, i) => `<circle cx="${p.x}" cy="${p.y}" r="10" fill="none" stroke="#ff6b6b" stroke-width="2" class="player-circle" data-type="defense" data-index="${i}"/>`).join('');

      const drawnLines = (currentPlayDiagram.lines || []).map(line => {
        if (line.type === 'route') {
          return `<line x1="${line.x1}" y1="${line.y1}" x2="${line.x2}" y2="${line.y2}" stroke="#ffcc00" stroke-width="2.5" stroke-linecap="round"/>
            <polygon points="${line.x2},${line.y2} ${line.x2 - 8},${line.y2 - 5} ${line.x2 - 5},${line.y2 - 8}" fill="#ffcc00"/>`;
        } else if (line.type === 'block') {
          // Calculate perpendicular T-shape
          const dx = line.x2 - line.x1;
          const dy = line.y2 - line.y1;
          const len = Math.sqrt(dx * dx + dy * dy);
          const ux = dx / len;
          const uy = dy / len;
          const px = -uy * 8;
          const py = ux * 8;
          return `<line x1="${line.x1}" y1="${line.y1}" x2="${line.x2}" y2="${line.y2}" stroke="#00ff00" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="${line.x2 + px}" y1="${line.y2 + py}" x2="${line.x2 - px}" y2="${line.y2 - py}" stroke="#00ff00" stroke-width="2.5" stroke-linecap="round"/>`;
        } else if (line.type === 'motion') {
          return `<path d="M ${line.x1} ${line.y1} Q ${(line.x1 + line.x2) / 2} ${line.y1 - 15} ${line.x2} ${line.y2}" stroke="#cc00ff" stroke-width="2.5" fill="none" stroke-dasharray="3,3" stroke-linecap="round"/>
            <polygon points="${line.x2},${line.y2} ${line.x2 - 8},${line.y2 - 5} ${line.x2 - 5},${line.y2 - 8}" fill="#cc00ff"/>`;
        }
      }).join('');

      svg.innerHTML = `
        <!-- Sidelines -->
        <line x1="20" y1="20" x2="20" y2="280" stroke="white" stroke-width="2"/>
        <line x1="500" y1="20" x2="500" y2="280" stroke="white" stroke-width="2"/>
        <!-- Goal lines -->
        <line x1="60" y1="20" x2="60" y2="280" stroke="white" stroke-width="3"/>
        <line x1="460" y1="20" x2="460" y2="280" stroke="white" stroke-width="3"/>
        <!-- 50-yard line -->
        <line x1="260" y1="20" x2="260" y2="280" stroke="white" stroke-width="3"/>
        <!-- Yard lines (10 yard increments) -->
        <line x1="100" y1="20" x2="100" y2="280" stroke="white" stroke-width="1"/>
        <line x1="140" y1="20" x2="140" y2="280" stroke="white" stroke-width="1"/>
        <line x1="180" y1="20" x2="180" y2="280" stroke="white" stroke-width="1"/>
        <line x1="220" y1="20" x2="220" y2="280" stroke="white" stroke-width="1"/>
        <line x1="300" y1="20" x2="300" y2="280" stroke="white" stroke-width="1"/>
        <line x1="340" y1="20" x2="340" y2="280" stroke="white" stroke-width="1"/>
        <line x1="380" y1="20" x2="380" y2="280" stroke="white" stroke-width="1"/>
        <line x1="420" y1="20" x2="420" y2="280" stroke="white" stroke-width="1"/>
        <!-- Hash marks (every 10 yards) -->
        <line x1="60" y1="145" x2="100" y2="145" stroke="white" stroke-width="1"/>
        <line x1="140" y1="145" x2="180" y2="145" stroke="white" stroke-width="1"/>
        <line x1="220" y1="145" x2="260" y2="145" stroke="white" stroke-width="1"/>
        <line x1="260" y1="145" x2="300" y2="145" stroke="white" stroke-width="1"/>
        <line x1="340" y1="145" x2="380" y2="145" stroke="white" stroke-width="1"/>
        <line x1="420" y1="145" x2="460" y2="145" stroke="white" stroke-width="1"/>
        <!-- End zones -->
        <rect x="20" y="20" width="40" height="260" fill="none" stroke="white" stroke-width="1" stroke-dasharray="2,2" opacity="0.3"/>
        <rect x="460" y="20" width="40" height="260" fill="none" stroke="white" stroke-width="1" stroke-dasharray="2,2" opacity="0.3"/>
        ${drawnLines}
        ${offenseCircles}
        ${defenseCircles}
      `;

      // Re-attach event listeners
      svg.addEventListener('mousedown', handleFieldMouseDown);
      svg.addEventListener('mousemove', handleFieldMouseMove);
      svg.addEventListener('mouseup', handleFieldMouseUp);
      svg.querySelectorAll('.player-circle').forEach(el => {
        el.addEventListener('mousedown', handleFieldMouseDown);
      });
    }

    let dragging = null;

    function handleFieldMouseDown(e) {
      if (drawMode && (e.target.tagName === 'svg' || e.target.tagName === 'line' || e.target.tagName === 'rect' || e.target.tagName === 'path')) {
        // Drawing mode
        const svg = document.getElementById('fieldEditor');
        const rect = svg.getBoundingClientRect();
        startPoint = {
          x: (e.clientX - rect.left) / rect.width * 520,
          y: (e.clientY - rect.top) / rect.height * 300
        };
        isDrawing = true;
      } else if (e.target.classList.contains('player-circle')) {
        // Dragging player
        dragging = {
          element: e.target,
          type: e.target.dataset.type,
          index: parseInt(e.target.dataset.index),
          startX: e.clientX,
          startY: e.clientY,
          initialX: parseFloat(e.target.cx.baseVal.value),
          initialY: parseFloat(e.target.cy.baseVal.value)
        };
      }
    }

    function handleFieldMouseMove(e) {
      if (isDrawing && startPoint) {
        // Preview line while drawing - this is handled by re-rendering with temp line
        return;
      }
      if (!dragging) return;
      const svg = document.getElementById('fieldEditor');
      const rect = svg.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width * 520;
      const y = (e.clientY - rect.top) / rect.height * 300;
      
      if (dragging.type === 'offense') {
        currentPlayDiagram.offense[dragging.index].x = Math.max(40, Math.min(480, x));
        currentPlayDiagram.offense[dragging.index].y = Math.max(30, Math.min(270, y));
      } else {
        currentPlayDiagram.defense[dragging.index].x = Math.max(40, Math.min(480, x));
        currentPlayDiagram.defense[dragging.index].y = Math.max(30, Math.min(270, y));
      }
      renderField();
    }

    function handleFieldMouseUp(e) {
      if (isDrawing && startPoint && drawMode) {
        const svg = document.getElementById('fieldEditor');
        const rect = svg.getBoundingClientRect();
        const endPoint = {
          x: (e.clientX - rect.left) / rect.width * 520,
          y: (e.clientY - rect.top) / rect.height * 300
        };
        
        // Only add line if it has some length
        const distance = Math.sqrt(Math.pow(endPoint.x - startPoint.x, 2) + Math.pow(endPoint.y - startPoint.y, 2));
        if (distance > 10) {
          currentPlayDiagram.lines = currentPlayDiagram.lines || [];
          currentPlayDiagram.lines.push({
            type: drawMode,
            x1: startPoint.x,
            y1: startPoint.y,
            x2: endPoint.x,
            y2: endPoint.y
          });
        }
        renderField();
      }
      isDrawing = false;
      startPoint = null;
      dragging = null;
    }

    function saveNewPlay() {
      const name = document.getElementById('playName').value.trim();
      if (!name) return alert('Enter a play name');

      appData.teams[activeTeam].playbook.push({
        id: Date.now().toString(),
        name,
        category: document.getElementById('playCategory').value,
        formation: document.getElementById('playForm').value,
        description: document.getElementById('playDesc').value,
        diagram: JSON.parse(JSON.stringify(currentPlayDiagram))
      });
      saveData();
      document.getElementById('playName').value = '';
      document.getElementById('playDesc').value = '';
      document.getElementById('playCategory').value = 'Offensive';
      resetTemplate();
      renderPlaybookList();
      renderPlaybookSidebar();
      alert('Play saved!');
    }

    function renderPlaybookList() {
      const team = appData.teams[activeTeam];
      let html = '<h2>Your Plays</h2>';
      if (team.playbook.length === 0) {
        html += '<div class="empty-state">No plays yet</div>';
      } else {
        html += '<div style="display: grid; gap: 8px;">';
        team.playbook.forEach(p => {
          const offenseCircles = (p.diagram?.offense || []).map(pos => `<circle cx="${pos.x}" cy="${pos.y}" r="7" fill="#fff" stroke="#0066cc" stroke-width="1.5"/>`).join('');
          const defenseCircles = (p.diagram?.defense || []).map(pos => `<circle cx="${pos.x}" cy="${pos.y}" r="7" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>`).join('');
          
          const drawnLines = (p.diagram?.lines || []).map(line => {
            if (line.type === 'route') {
              return `<line x1="${line.x1}" y1="${line.y1}" x2="${line.x2}" y2="${line.y2}" stroke="#ffcc00" stroke-width="1.5" stroke-linecap="round"/>
                <polygon points="${line.x2},${line.y2} ${line.x2 - 5},${line.y2 - 3} ${line.x2 - 3},${line.y2 - 5}" fill="#ffcc00"/>`;
            } else if (line.type === 'block') {
              // T-shape
              const dx = line.x2 - line.x1;
              const dy = line.y2 - line.y1;
              const len = Math.sqrt(dx * dx + dy * dy);
              const ux = dx / len;
              const uy = dy / len;
              const px = -uy * 6;
              const py = ux * 6;
              return `<line x1="${line.x1}" y1="${line.y1}" x2="${line.x2}" y2="${line.y2}" stroke="#00ff00" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="${line.x2 + px}" y1="${line.y2 + py}" x2="${line.x2 - px}" y2="${line.y2 - py}" stroke="#00ff00" stroke-width="1.5" stroke-linecap="round"/>`;
            } else if (line.type === 'motion') {
              return `<path d="M ${line.x1} ${line.y1} Q ${(line.x1 + line.x2) / 2} ${line.y1 - 10} ${line.x2} ${line.y2}" stroke="#cc00ff" stroke-width="1.5" fill="none" stroke-dasharray="2,2" stroke-linecap="round"/>
                <polygon points="${line.x2},${line.y2} ${line.x2 - 5},${line.y2 - 3} ${line.x2 - 3},${line.y2 - 5}" fill="#cc00ff"/>`;
            }
          }).join('');
          
          html += `<div class="card" style="border-left: 4px solid #0066cc;">
            <div style="font-weight: 600; font-size: 15px;">${p.name}</div>
            <div style="font-size: 12px; color: #999; margin-bottom: 6px;">${p.category || 'Offensive'} • ${p.formation}</div>
            ${p.description ? `<div style="font-size: 12px; color: #666; margin-bottom: 8px;">${p.description}</div>` : ''}
            <div class="play-diagram">
              <svg width="100%" height="180" viewBox="0 0 520 300" style="background: #1a4d2e; border: 2px solid #fff; border-radius: 4px;">
                <!-- Goal lines -->
                <line x1="60" y1="20" x2="60" y2="280" stroke="white" stroke-width="2"/>
                <line x1="460" y1="20" x2="460" y2="280" stroke="white" stroke-width="2"/>
                <!-- 50-yard line -->
                <line x1="260" y1="20" x2="260" y2="280" stroke="white" stroke-width="2"/>
                <!-- Yard lines -->
                <line x1="100" y1="20" x2="100" y2="280" stroke="white" stroke-width="0.5"/>
                <line x1="140" y1="20" x2="140" y2="280" stroke="white" stroke-width="0.5"/>
                <line x1="180" y1="20" x2="180" y2="280" stroke="white" stroke-width="0.5"/>
                <line x1="220" y1="20" x2="220" y2="280" stroke="white" stroke-width="0.5"/>
                <line x1="300" y1="20" x2="300" y2="280" stroke="white" stroke-width="0.5"/>
                <line x1="340" y1="20" x2="340" y2="280" stroke="white" stroke-width="0.5"/>
                <line x1="380" y1="20" x2="380" y2="280" stroke="white" stroke-width="0.5"/>
                <line x1="420" y1="20" x2="420" y2="280" stroke="white" stroke-width="0.5"/>
                <!-- Sidelines -->
                <line x1="20" y1="20" x2="20" y2="280" stroke="white" stroke-width="1.5"/>
                <line x1="500" y1="20" x2="500" y2="280" stroke="white" stroke-width="1.5"/>
                <!-- Hash marks -->
                <line x1="60" y1="145" x2="100" y2="145" stroke="white" stroke-width="0.5"/>
                <line x1="140" y1="145" x2="180" y2="145" stroke="white" stroke-width="0.5"/>
                <line x1="220" y1="145" x2="260" y2="145" stroke="white" stroke-width="0.5"/>
                <line x1="260" y1="145" x2="300" y2="145" stroke="white" stroke-width="0.5"/>
                <line x1="340" y1="145" x2="380" y2="145" stroke="white" stroke-width="0.5"/>
                <line x1="420" y1="145" x2="460" y2="145" stroke="white" stroke-width="0.5"/>
                ${drawnLines}
                ${offenseCircles}
                ${defenseCircles}
              </svg>
            </div>
            <button class="btn-danger btn-small" onclick="removePlay('${p.id}')" style="margin-top: 8px;">Delete</button>
          </div>`;
        });
        html += '</div>';
      }
      const playbookElement = document.getElementById('playbookList');
      if (playbookElement) {
        playbookElement.innerHTML = html;
      }
    }

    function renderPlaybookSidebar() {
      const team = appData.teams[activeTeam];
      const sidebar = document.getElementById('playbookSidebar');
      if (!sidebar) return;

      // Group plays by category
      const categories = {};
      team.playbook.forEach(p => {
        const cat = p.category || 'Other';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(p);
      });

      let html = '';
      if (team.playbook.length === 0) {
        html = '<div style="color: #999; font-size: 12px; padding: 12px; text-align: center;">No plays yet</div>';
      } else {
        Object.keys(categories).sort().forEach(cat => {
          html += `<div style="margin-bottom: 12px;">
            <div style="font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; margin-bottom: 6px;">${cat}</div>
            <div style="display: grid; gap: 4px;">`;
          categories[cat].forEach(p => {
            html += `<div style="padding: 8px; background: #f9f9f9; border-radius: 4px; font-size: 12px; cursor: pointer; border-left: 2px solid #0066cc; hover-bg: #f0f0f0;" title="${p.description || ''}">
              <div style="font-weight: 500;">${p.name}</div>
              <div style="font-size: 10px; color: #999;">${p.formation}</div>
            </div>`;
          });
          html += `</div></div>`;
        });
      }

      sidebar.innerHTML = html;
    }
      appData.teams[activeTeam].playbook = appData.teams[activeTeam].playbook.filter(p => p.id !== id);
      saveData();
      renderPlaybook();
    }

    function renderGameDay() {
      const team = appData.teams[activeTeam];
      let html = `<h2>Game Day Tracker</h2>`;

      if (!currentGame) {
        html += `<div class="card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
          <h3 style="margin-top: 0; color: white;">Start New Game</h3>
          <div class="form-group">
            <input type="text" id="gameTitle" class="input" placeholder="Opponent name" style="margin-bottom: 8px;">
            <input type="date" id="gameDate" class="input" value="${new Date().toISOString().split('T')[0]}" style="margin-bottom: 8px;">
            <button class="btn btn-success" onclick="startGame()" style="width: 100%;">Start Game</button>
          </div>
        </div>`;

        if (team.games.length > 0) {
          html += '<h3 style="margin-top: 24px;">Game History</h3>';
          html += '<div style="display: grid; gap: 8px;">';
          team.games.forEach(g => {
            const totalSubs = (g.subs || []).length;
            html += `<div class="card">
              <div style="font-weight: 600;">${g.title}</div>
              <div style="font-size: 12px; color: #999;">${g.date}  •  ${totalSubs} substitutions  •  Final: ${g.finalScore || '—'}</div>
            </div>`;
          });
          html += '</div>';
        }
      } else {
        // In-game view
        html += `<div class="game-banner">
          <div class="game-score">
            <div>
              <div style="font-size: 14px; opacity: 0.9;">SCORE</div>
              <div class="score-board">${currentGame.score || 0}</div>
            </div>
            <div class="quarter-info">${currentGame.quarter || 'Q1'}</div>
            <div style="text-align: left;">
              <div style="font-size: 14px; opacity: 0.9;">vs.</div>
              <div class="score-board" style="font-size: 24px;">${currentGame.title}</div>
            </div>
          </div>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; margin-top: 12px;">
            <button class="btn btn-secondary btn-small" onclick="updateScore(7)">+7</button>
            <button class="btn btn-secondary btn-small" onclick="updateScore(6)">+6</button>
            <button class="btn btn-secondary btn-small" onclick="nextQuarter()">Next Q</button>
            <button class="btn btn-danger" onclick="endGame()">End Game</button>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <h3>Log Substitution</h3>
            <select id="playerIn" class="input" style="margin-bottom: 8px;">
              <option value="">Player IN...</option>
              ${team.players.map(p => `<option value="${p.id}">#${p.number}  ${p.name}</option>`).join('')}
            </select>
            <select id="playerOut" class="input" style="margin-bottom: 8px;">
              <option value="">Player OUT...</option>
              ${team.players.map(p => `<option value="${p.id}">#${p.number}  ${p.name}</option>`).join('')}
            </select>
            <button class="btn btn-success" onclick="logSub()" style="width: 100%;">Log Sub</button>
          </div>

          <div class="card">
            <h3>Players On Field</h3>
            <div id="onField" style="display: grid; gap: 6px; max-height: 300px; overflow-y: auto;"></div>
          </div>
        </div>

        <div class="card">
          <h3>Substitution Log</h3>
          <div id="subLog"></div>
        </div>`;
      }

      document.getElementById('gameday').innerHTML = html;
      if (currentGame) {
        updateGameDisplay();
      }
    }

    function startGame() {
      const title = document.getElementById('gameTitle').value.trim();
      const date = document.getElementById('gameDate').value;
      if (title) {
        currentGame = { 
          id: Date.now().toString(), 
          title, 
          date,
          quarter: 'Q1',
          score: 0,
          subs: [],
          onField: []
        };
        renderGameDay();
      }
    }

    function updateScore(points) {
      if (currentGame) {
        currentGame.score = (currentGame.score || 0) + points;
        updateGameDisplay();
      }
    }

    function nextQuarter() {
      if (currentGame) {
        const quarters = ['Q1', 'Q2', 'Q3', 'Q4'];
        const currentIndex = quarters.indexOf(currentGame.quarter);
        if (currentIndex < 3) {
          currentGame.quarter = quarters[currentIndex + 1];
          updateGameDisplay();
        }
      }
    }

    function logSub() {
      const inId = document.getElementById('playerIn').value;
      const outId = document.getElementById('playerOut').value;
      if (inId && outId && currentGame) {
        const team = appData.teams[activeTeam];
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        currentGame.subs.push({ in: inId, out: outId, time, quarter: currentGame.quarter });
        
        currentGame.onField = currentGame.onField.filter(id => id !== outId);
        if (!currentGame.onField.includes(inId)) {
          currentGame.onField.push(inId);
        }
        
        renderGameDay();
      }
    }

    function updateGameDisplay() {
      const team = appData.teams[activeTeam];
      
      let onFieldHtml = '';
      if (currentGame.onField.length === 0) {
        onFieldHtml = '<div style="color: #999; font-size: 12px;">Log substitutions to track who is on field</div>';
      } else {
        currentGame.onField.forEach(id => {
          const player = team.players.find(p => p.id === id);
          if (player) {
            onFieldHtml += `<div class="player-chip" style="background: #4caf50; color: white;">#${player.number}  ${player.name}</div>`;
          }
        });
      }
      document.getElementById('onField').innerHTML = onFieldHtml;

      let subLogHtml = '';
      if (currentGame.subs.length === 0) {
        subLogHtml = '<div style="color: #999;">No substitutions yet</div>';
      } else {
        currentGame.subs.slice().reverse().forEach(s => {
          const inPlayer = team.players.find(p => p.id === s.in);
          const outPlayer = team.players.find(p => p.id === s.out);
          subLogHtml += `<div class="sub-history">
            <div class="sub-time">${s.time}  •  ${s.quarter}</div>
            <div class="sub-change">
              <span class="sub-out">${outPlayer?.name} #${outPlayer?.number}</span>
              <span style="color: #999;">→</span>
              <span class="sub-in">#${inPlayer?.number}  ${inPlayer?.name}</span>
            </div>
          </div>`;
        });
      }
      document.getElementById('subLog').innerHTML = subLogHtml;
    }

    function endGame() {
      if (currentGame) {
        currentGame.finalScore = `${currentGame.score}–0`;
        appData.teams[activeTeam].games.push(currentGame);
        saveData();
        currentGame = null;
        renderGameDay();
      }
    }

    init();
  </script>
</body>
</html>
