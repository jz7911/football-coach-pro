<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flag Football Coach Pro</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #fafafa;
      color: #333;
    }
    #root { min-height: 100vh; }
    .rating-stars { display: flex; gap: 4px; cursor: pointer; }
    .star { font-size: 20px; color: #ddd; cursor: pointer; }
    .star.filled { color: #ffc107; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FootballAppPro = () => {
      const [activeTeam, setActiveTeam] = useState('5-6');
      const [view, setView] = useState('home');
      const [data, setData] = useState({
        teams: {
          '5-6': { name: '5/6 Division', players: [], practices: [], playbook: [], games: [], evals: {} },
          '7-8': { name: '7/8 Division', players: [], practices: [], playbook: [], games: [], evals: {} }
        }
      });

      useEffect(() => {
        loadData();
      }, []);

      const loadData = () => {
        const saved = localStorage.getItem('football-coach-pro');
        if (saved) {
          setData(JSON.parse(saved));
        }
      };

      const saveData = (newData) => {
        setData(newData);
        localStorage.setItem('football-coach-pro', JSON.stringify(newData));
      };

      const currentTeam = data.teams[activeTeam];

      return (
        <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '16px' }}>
          <div style={{ marginBottom: '24px', borderBottom: '1px solid #ddd', paddingBottom: '16px' }}>
            <h1 style={{ margin: '0 0 16px 0', fontSize: '32px', fontWeight: '700' }}>🏈  Flag Football Coach Pro</h1>
            <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
              {Object.entries(data.teams).map(([key, team]) => (
                <button
                  key={key}
                  onClick={() => setActiveTeam(key)}
                  style={{
                    padding: '10px 16px',
                    border: activeTeam === key ? '2px solid #333' : '0.5px solid #ccc',
                    borderRadius: '6px',
                    background: activeTeam === key ? '#333' : 'white',
                    color: activeTeam === key ? 'white' : '#333',
                    cursor: 'pointer',
                    fontWeight: '500',
                    fontSize: '14px'
                  }}
                >
                  {team.name}
                </button>
              ))}
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: '8px' }}>
              {[
                { id: 'home', label: 'Dashboard', icon: '📊' },
                { id: 'roster', label: 'Roster', icon: '👥' },
                { id: 'evals', label: 'Evaluations', icon: '⭐' },
                { id: 'practice', label: 'Practices', icon: '📋' },
                { id: 'playbook', label: 'Playbook', icon: '📖' },
                { id: 'formations', label: 'Formations', icon: '📐' },
                { id: 'gameday', label: 'Game Day', icon: '🎮' }
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setView(tab.id)}
                  style={{
                    padding: '8px 12px',
                    border: view === tab.id ? '1px solid #333' : '0.5px solid #ccc',
                    borderRadius: '4px',
                    background: view === tab.id ? '#333' : '#f5f5f5',
                    color: view === tab.id ? 'white' : '#333',
                    cursor: 'pointer',
                    fontSize: '12px',
                    fontWeight: view === tab.id ? '600' : '400'
                  }}
                >
                  {tab.icon}
                </button>
              ))}
            </div>
          </div>

          {view === 'home' && <DashboardView team={currentTeam} teamKey={activeTeam} data={data} />}
          {view === 'roster' && <RosterView team={currentTeam} teamKey={activeTeam} onUpdate={saveData} data={data} />}
          {view === 'evals' && <EvalsView team={currentTeam} teamKey={activeTeam} onUpdate={saveData} data={data} />}
          {view === 'practice' && <PracticeView team={currentTeam} teamKey={activeTeam} onUpdate={saveData} data={data} />}
          {view === 'playbook' && <PlaybookView team={currentTeam} teamKey={activeTeam} onUpdate={saveData} data={data} />}
          {view === 'formations' && <FormationsView team={currentTeam} />}
          {view === 'gameday' && <GameDayView team={currentTeam} teamKey={activeTeam} onUpdate={saveData} data={data} />}
        </div>
      );
    };

    const DashboardView = ({ team, teamKey, data }) => {
      const avgPlayerRating = team.players.length > 0
        ? (team.players.reduce((sum, p) => sum + (data.teams[teamKey].evals[p.id]?.overall || 0), 0) / team.players.length).toFixed(1)
        : 0;

      return (
        <div style={{ marginTop: '16px' }}>
          <h2 style={{ fontSize: '24px', fontWeight: '600', marginBottom: '20px' }}>Team Dashboard: {team.name}</h2>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '16px', marginBottom: '24px' }}>
            <StatCard label="Players" value={team.players.length} />
            <StatCard label="Avg Rating" value={avgPlayerRating} />
            <StatCard label="Practice Plans" value={team.practices.length} />
            <StatCard label="Playbook Plays" value={team.playbook.length} />
            <StatCard label="Games Tracked" value={team.games.length} />
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
            <div style={{ backgroundColor: 'white', padding: '16px', borderRadius: '8px', border: '0.5px solid #ddd' }}>
              <h3 style={{ margin: '0 0 12px 0', fontSize: '16px', fontWeight: '600' }}>Quick Actions</h3>
              <ul style={{ margin: 0, paddingLeft: '20px', fontSize: '14px', lineHeight: '2' }}>
                <li>Add players to roster</li>
                <li>Rate players with skill evaluations</li>
                <li>Create or use pre-made practice plans</li>
                <li>Build your playbook by formations</li>
                <li>Track substitutions on game day</li>
              </ul>
            </div>

            {team.players.length > 0 && (
              <div style={{ backgroundColor: 'white', padding: '16px', borderRadius: '8px', border: '0.5px solid #ddd' }}>
                <h3 style={{ margin: '0 0 12px 0', fontSize: '16px', fontWeight: '600' }}>Top Rated Players</h3>
                <div style={{ display: 'grid', gap: '8px', fontSize: '13px' }}>
                  {team.players
                    .map(p => ({ ...p, rating: data.teams[teamKey].evals[p.id]?.overall || 0 }))
                    .sort((a, b) => b.rating - a.rating)
                    .slice(0, 5)
                    .map(p => (
                      <div key={p.id} style={{ display: 'flex', justifyContent: 'space-between', paddingBottom: '6px', borderBottom: '0.5px solid #eee' }}>
                        <span>#{p.number}  {p.name}</span>
                        <span style={{ fontWeight: '600', color: '#333' }}>⭐  {p.rating.toFixed(1)}</span>
                      </div>
                    ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const StatCard = ({ label, value }) => (
      <div style={{ padding: '16px', backgroundColor: 'white', border: '0.5px solid #ddd', borderRadius: '8px', textAlign: 'center' }}>
        <div style={{ fontSize: '12px', color: '#999', marginBottom: '8px' }}>{label}</div>
        <div style={{ fontSize: '32px', fontWeight: '700', color: '#333' }}>{value}</div>
      </div>
    );

    const RosterView = ({ team, teamKey, onUpdate, data }) => {
      const [name, setName] = useState('');
      const [number, setNumber] = useState('');
      const [position, setPosition] = useState('WR');
      const [editingId, setEditingId] = useState(null);
      const [editName, setEditName] = useState('');

      const addPlayer = () => {
        if (name.trim()) {
          const newData = { ...data };
          newData.teams[teamKey].players.push({
            id: Date.now(),
            name: name.trim(),
            number: number || '0',
            position,
            stats: { played: 0, touchdowns: 0, touches: 0, defensiveStops: 0 }
          });
          onUpdate(newData);
          setName('');
          setNumber('');
        }
      };

      const removePlayer = (id) => {
        const newData = { ...data };
        newData.teams[teamKey].players = newData.teams[teamKey].players.filter(p => p.id !== id);
        onUpdate(newData);
      };

      const updatePlayer = (id, updates) => {
        const newData = { ...data };
        const player = newData.teams[teamKey].players.find(p => p.id === id);
        if (player) {
          Object.assign(player, updates);
          onUpdate(newData);
        }
      };

      return (
        <div style={{ marginTop: '16px' }}>
          <h2 style={{ fontSize: '24px', fontWeight: '600', marginBottom: '20px' }}>Manage Roster</h2>

          <div style={{ backgroundColor: '#f9f9f9', padding: '16px', borderRadius: '8px', marginBottom: '24px', border: '0.5px solid #ddd' }}>
            <h3 style={{ margin: '0 0 12px 0', fontSize: '14px', fontWeight: '600' }}>Add New Player</h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '8px', marginBottom: '12px' }}>
              <input
                type="text"
                placeholder="Player name"
                value={name}
                onChange={(e) => setName(e.target.value)}
                style={{ padding: '8px 12px', border: '0.5px solid #ccc', borderRadius: '4px', fontSize: '14px' }}
              />
              <input
                type="text"
                placeholder="Jersey #"
                value={number}
                onChange={(e) => setNumber(e.target.value)}
                style={{ padding: '8px 12px', border: '0.5px solid #ccc', borderRadius: '4px', fontSize: '14px' }}
              />
              <select
                value={position}
                onChange={(e) => setPosition(e.target.value)}
                style={{ padding: '8px 12px', border: '0.5px solid #ccc', borderRadius: '4px', fontSize: '14px' }}
              >
                <option>WR</option>
                <option>QB</option>
                <option>RB</option>
                <option>DEF</option>
              </select>
              <button
                onClick={addPlayer}
                style={{
                  padding: '8px 16px',
                  backgroundColor: '#333',
                  color: 'white',
                  border: 'none',
                  borderRadius: '4px',
                  cursor: 'pointer',
                  fontSize: '14px',
                  fontWeight: '600'
                }}
              >
                Add Player
              </button>
            </div>
          </div>

          {team.players.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '40px', color: '#999', backgroundColor: 'white', borderRadius: '8px', border: '0.5px solid #ddd' }}>
              No players yet.  Add your first player above.
            </div>
          ) : (
            <div style={{ display: 'grid', gap: '8px' }}>
              {team.players.map(player => (
                <div
                  key={player.id}
                  style={{
                    padding: '16px',
                    backgroundColor: 'white',
                    border: '0.5px solid #ddd',
                    borderRadius: '6px',
                    display: 'grid',
                    gridTemplateColumns: '1fr 1fr auto',
                    gap: '16px',
                    alignItems: 'center'
                  }}
                >
                  <div>
                    <div style={{ fontWeight: '600', fontSize: '15px' }}>#{player.number}  {player.name}</div>
                    <div style={{ fontSize: '12px', color: '#999' }}>Position: {player.position}</div>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '8px', fontSize: '12px' }}>
                    <div>
                      <div style={{ color: '#999', marginBottom: '4px' }}>Touches</div>
                      <input
                        type="number"
                        value={player.stats?.touches || 0}
                        onChange={(e) => updatePlayer(player.id, { stats: { ...player.stats, touches: parseInt(e.target.value) || 0 } })}
                        style={{ width: '100%', padding: '4px', border: '0.5px solid #ccc', borderRadius: '3px', fontSize: '12px' }}
                      />
                    </div>
                    <div>
                      <div style={{ color: '#999', marginBottom: '4px' }}>TDs</div>
                      <input
                        type="number"
                        value={player.stats?.touchdowns || 0}
                        onChange={(e) => updatePlayer(player.id, { stats: { ...player.stats, touchdowns: parseInt(e.target.value) || 0 } })}
                        style={{ width: '100%', padding: '4px', border: '0.5px solid #ccc', borderRadius: '3px', fontSize: '12px' }}
                      />
                    </div>
                    <div>
                      <div style={{ color: '#999', marginBottom: '4px' }}>DEF</div>
                      <input
                        type="number"
                        value={player.stats?.defensiveStops || 0}
                        onChange={(e) => updatePlayer(player.id, { stats: { ...player.stats, defensiveStops: parseInt(e.target.value) || 0 } })}
                        style={{ width: '100%', padding: '4px', border: '0.5px solid #ccc', borderRadius: '3px', fontSize: '12px' }}
                      />
                    </div>
                    <div>
                      <div style={{ color: '#999', marginBottom: '4px' }}>Games</div>
                      <input
                        type="number"
                        value={player.stats?.played || 0}
                        onChange={(e) => updatePlayer(player.id, { stats: { ...player.stats, played: parseInt(e.target.value) || 0 } })}
                        style={{ width: '100%', padding: '4px', border: '0.5px solid #ccc', borderRadius: '3px', fontSize: '12px' }}
                      />
                    </div>
                  </div>
                  <button
                    onClick={() => removePlayer(player.id)}
                    style={{
                      padding: '4px 8px',
                      border: '0.5px solid #ccc',
                      background: '#fff',
                      borderRadius: '4px',
                      cursor: 'pointer',
                      fontSize: '12px',
                      color: '#d00'
                    }}
                  >
                    Remove
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    const EvalsView = ({ team, teamKey, onUpdate, data }) => {
      const [selectedPlayer, setSelectedPlayer] = useState(team.players[0]?.id || null);
      const evals = data.teams[teamKey].evals || {};
      const playerEval = selectedPlayer ? evals[selectedPlayer] || {} : {};

      const updateRating = (skill, value) => {
        const newData = { ...data };
        if (!newData.teams[teamKey].evals) newData.teams[teamKey].evals = {};
        if (!newData.teams[teamKey].evals[selectedPlayer]) newData.teams[teamKey].evals[selectedPlayer] = {};
        newData.teams[teamKey].evals[selectedPlayer][skill] = value;
        
        const skills = ['passing', 'receiving', 'running', 'defense', 'fieldAwareness', 'attitude'];
        const ratings = skills.map(s => newData.teams[teamKey].evals[selectedPlayer][s] || 0);
        newData.teams[teamKey].evals[selectedPlayer].overall = (ratings.reduce((a, b) => a + b, 0) / skills.length).toFixed(1);
        onUpdate(newData);
      };

      const updateNotes = (notes) => {
        const newData = { ...data };
        if (!newData.teams[teamKey].evals) newData.teams[teamKey].evals = {};
        if (!newData.teams[teamKey].evals[selectedPlayer]) newData.teams[teamKey].evals[selectedPlayer] = {};
        newData.teams[teamKey].evals[selectedPlayer].notes = notes;
        onUpdate(newData);
      };

      if (team.players.length === 0) {
        return <div style={{ marginTop: '20px', color: '#999' }}>Add players first</div>;
      }

      const currentPlayer = team.players.find(p => p.id === selectedPlayer);

      return (
        <div style={{ marginTop: '16px' }}>
          <h2 style={{ fontSize: '24px', fontWeight: '600', marginBottom: '20px' }}>Player Evaluations</h2>

          <div style={{ display: 'grid', gridTemplateColumns: '200px 1fr', gap: '16px' }}>
            <div style={{ display: 'grid', gap: '6px' }}>
              {team.players.map(player => (
                <button
                  key={player.id}
                  onClick={() => setSelectedPlayer(player.id)}
                  style={{
                    padding: '8px 12px',
                    border: selectedPlayer === player.id ? '2px solid #333' : '0.5px solid #ccc',
                    borderRadius: '4px',
                    background: selectedPlayer === player.id ? '#333' : 'white',
                    color: selectedPlayer === player.id ? 'white' : '#333',
                    cursor: 'pointer',
                    fontSize: '13px',
                    fontWeight: selectedPlayer === player.id ? '600' : '400',
                    textAlign: 'left'
                  }}
                >
                  #{player.number}  {player.name}
                </button>
              ))}
            </div>

            {selectedPlayer && (
              <div style={{ backgroundColor: 'white', padding: '20px', borderRadius: '8px', border: '0.5px solid #ddd' }}>
                <h3 style={{ margin: '0 0 16px 0', fontSize: '18px', fontWeight: '600' }}>
                  {currentPlayer.name}  <span style={{ color: '#ffc107', fontSize: '20px' }}>⭐  {playerEval.overall || 0}</span>
                </h3>

                <div style={{ display: 'grid', gap: '16px' }}>
                  {[
                    { skill: 'passing', label: 'Passing' },
                    { skill: 'receiving', label: 'Receiving' },
                    { skill: 'running', label: 'Running' },
                    { skill: 'defense', label: 'Defense' },
                    { skill: 'fieldAwareness', label: 'Field Awareness' },
                    { skill: 'attitude', label: 'Attitude/Effort' }
                  ].map(({ skill, label }) => (
                    <div key={skill}>
                      <label style={{ fontSize: '13px', fontWeight: '500', display: 'block', marginBottom: '6px' }}>
                        {label}: {playerEval[skill] || 0}/5
                      </label>
                      <div style={{ display: 'flex', gap: '4px' }}>
                        {[1, 2, 3, 4, 5].map(i => (
                          <button
                            key={i}
                            onClick={() => updateRating(skill, i)}
                            style={{
                              width: '32px',
                              height: '32px',
                              border: playerEval[skill] === i ? '2px solid #333' : '0.5px solid #ccc',
                              borderRadius: '4px',
                              background: playerEval[skill] >= i ? '#ffc107' : '#f5f5f5',
                              cursor: 'pointer',
                              fontSize: '14px',
                              fontWeight: '600'
                            }}
                          >
                            ★
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}

                  <div>
                    <label style={{ fontSize: '13px', fontWeight: '500', display: 'block', marginBottom: '6px' }}>Notes</label>
                    <textarea
                      value={playerEval.notes || ''}
                      onChange={(e) => updateNotes(e.target.value)}
                      placeholder="Add coaching notes..."
                      style={{
                        width: '100%',
                        padding: '8px 12px',
                        border: '0.5px solid #ccc',
                        borderRadius: '4px',
                        fontSize: '13px',
                        minHeight: '100px',
                        fontFamily: 'inherit',
                        resize: 'vertical'
                      }}
                    />
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const preBuiltPlans = {
      '5-6': [
        {
          title: 'Week 1 - Foundations',
          drills: [
            { name: 'Teamwork', duration: 3 },
            { name: 'Straight Leg March', duration: 5 },
            { name: 'Skipping', duration: 5 },
            { name: 'My Gears', duration: 6 },
            { name: 'Log Roll Bonanza', duration: 3 },
            { name: 'Meet in the Middle Grip Drill', duration: 3 },
            { name: 'Catch and Step with Partner', duration: 4 },
            { name: 'Hot Potato', duration: 4 },
            { name: 'No Hands Get Up', duration: 1 },
            { name: 'Position Tag', duration: 5 }
          ]
        },
        {
          title: 'Week 2 - Running & Receiving',
          drills: [
            { name: 'Teamwork', duration: 3 },
            { name: 'Walking Knee Hugs', duration: 5 },
            { name: 'Hops Forward/Backward', duration: 5 },
            { name: 'Gear Runs', duration: 6 },
            { name: 'Position Tag', duration: 4 },
            { name: 'Zig-zag Pathway', duration: 5 },
            { name: 'Hot Potato', duration: 4 },
            { name: 'Snake Run', duration: 5 },
            { name: 'Multi-Directional Get Up and Go', duration: 2 },
            { name: 'Learning to Fall Forward/Backward', duration: 4 }
          ]
        },
        {
          title: 'Week 3 - Kicking & Fundamentals',
          drills: [
            { name: 'Teamwork', duration: 3 },
            { name: 'Lateral Shuffle', duration: 5 },
            { name: 'Backwards Run', duration: 5 },
            { name: 'Gallops', duration: 6 },
            { name: 'Scatter Run', duration: 3 },
            { name: 'Balance Kicks', duration: 5 },
            { name: 'Partner Kicks', duration: 5 },
            { name: 'Partner Punts', duration: 4 },
            { name: 'Bear Crawl', duration: 3 },
            { name: 'Log Rolls', duration: 3 }
          ]
        },
        {
          title: 'Week 4 - Offensive Skills',
          drills: [
            { name: 'Teamwork', duration: 3 },
            { name: 'High Knees', duration: 5 },
            { name: 'Butt Kicks', duration: 5 },
            { name: 'Gear Runs', duration: 7 },
            { name: 'My Gears', duration: 5 },
            { name: 'Meet in the Middle Grip Drill', duration: 3 },
            { name: 'Partner Step and Throw', duration: 4 },
            { name: 'Throw and Catch Relay', duration: 5 },
            { name: 'Position Tag', duration: 5 },
            { name: 'Sharks and Minnows', duration: 6 }
          ]
        },
        {
          title: 'Week 5 - Defensive Drills',
          drills: [
            { name: 'Teamwork', duration: 3 },
            { name: 'Skip and March', duration: 5 },
            { name: 'Carioca', duration: 5 },
            { name: 'Partner Mirror Drill', duration: 5 },
            { name: 'Log Roll Bonanza', duration: 3 },
            { name: 'Snake Run', duration: 5 },
            { name: 'Catch and Step with Partner', duration: 4 },
            { name: 'Tag Games', duration: 5 },
            { name: 'Learning to Fall Forward/Backward', duration: 4 },
            { name: 'Position Tag', duration: 6 }
          ]
        },
        {
          title: 'Week 6 - Integrated Offense',
          drills: [
            { name: 'Teamwork', duration: 5 },
            { name: 'Lateral Shuffle', duration: 5 },
            { name: 'Jump and Land', duration: 6 },
            { name: 'Scatter Run', duration: 5 },
            { name: 'Meet in the Middle Grip Drill', duration: 3 },
            { name: 'Throw and Catch Relay', duration: 4 },
            { name: 'Hot Potato', duration: 4 },
            { name: 'Zig-zag Pathway', duration: 5 },
            { name: 'Sharks and Minnows', duration: 6 }
          ]
        },
        {
          title: 'Week 7 - Mid-Season Review',
          drills: [
            { name: 'Teamwork', duration: 5 },
            { name: 'High Knees', duration: 5 },
            { name: 'Bounds', duration: 5 },
            { name: 'Racetrack', duration: 6 },
            { name: 'Gear Runs', duration: 5 },
            { name: 'Meet in the Middle Grip Drill', duration: 3 },
            { name: 'Partner Step and Throw', duration: 4 },
            { name: 'Snake Run', duration: 5 },
            { name: 'Multi-Directional Get Up and Go', duration: 3 },
            { name: 'Position Tag', duration: 5 }
          ]
        },
        {
          title: 'Week 8 - Contact & Tackling Skills',
          drills: [
            { name: 'Teamwork', duration: 5 },
            { name: 'Carioca', duration: 5 },
            { name: 'Single-Leg Quad Stretch and Reach', duration: 5 },
            { name: 'Log Roll Bonanza', duration: 6 },
            { name: 'My Gears', duration: 5 },
            { name: 'Hot Potato', duration: 4 },
            { name: 'Throw and Catch Relay', duration: 4 },
            { name: 'Animal Relay', duration: 4 },
            { name: 'Learning to Fall Forward/Backward', duration: 4 },
            { name: 'Tag Games', duration: 6 }
          ]

    const GameDayView = ({ team, teamKey, onUpdate, data }) => {
      const [gameTitle, setGameTitle] = useState('');
      const [gameDate, setGameDate] = useState(new Date().toISOString().split('T')[0]);
      const [subs, setSubs] = useState([]);
      const [currentGame, setCurrentGame] = useState(null);

      const startGame = () => {
        if (gameTitle.trim()) {
          setCurrentGame({ id: Date.now(), title: gameTitle, date: gameDate, subs: [] });
          setSubs([]);
          setGameTitle('');
        }
      };

      const logSubstitution = (playerIn, playerOut) => {
        if (playerIn && playerOut) {
          const newSub = { in: playerIn, out: playerOut, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
          const newSubs = [...subs, newSub];
          setSubs(newSubs);
          if (currentGame) setCurrentGame({ ...currentGame, subs: newSubs });
        }
      };

      const endGame = () => {
        if (currentGame) {
          const newData = { ...data };
          newData.teams[teamKey].games.push(currentGame);
          onUpdate(newData);
          setCurrentGame(null);
          setSubs([]);
          alert('Game saved!');
        }
      };

      if (!currentGame) {
        return (
          <div style={{ marginTop: '16px' }}>
            <h2 style={{ fontSize: '24px', fontWeight: '600', marginBottom: '20px' }}>Game Day Tracker</h2>
            {team.games.length > 0 && (
              <div style={{ marginBottom: '24px' }}>
                <h3 style={{ fontSize: '16px', fontWeight: '600', marginBottom: '12px' }}>Past Games</h3>
                <div style={{ display: 'grid', gap: '8px' }}>
                  {team.games.map(g => (
                    <div key={g.id} style={{ padding: '12px 16px', backgroundColor: 'white', border: '0.5px solid #ddd', borderRadius: '6px' }}>
                      <div style={{ fontWeight: '500' }}>{g.title}</div>
                      <div style={{ fontSize: '12px', color: '#999' }}>{g.date}  •  {g.subs.length} substitutions</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div style={{ backgroundColor: '#e8f4f8', padding: '16px', borderRadius: '8px', border: '0.5px solid #b3dce6' }}>
              <h3 style={{ margin: '0 0 12px 0', fontSize: '14px', fontWeight: '600' }}>Start New Game</h3>
              <input
                type="text"
                placeholder="Game title (e.g., vs. Park District Lions)"
                value={gameTitle}
                onChange={(e) => setGameTitle(e.target.value)}
                style={{ width: '100%', padding: '8px 12px', border: '0.5px solid #99c9d4', borderRadius: '4px', fontSize: '14px', marginBottom: '8px', boxSizing: 'border-box' }}
              />
              <input
                type="date"
                value={gameDate}
                onChange={(e) => setGameDate(e.target.value)}
                style={{ width: '100%', padding: '8px 12px', border: '0.5px solid #99c9d4', borderRadius: '4px', fontSize: '14px', marginBottom: '12px', boxSizing: 'border-box' }}
              />
              <button
                onClick={startGame}
                disabled={!gameTitle.trim()}
                style={{
                  width: '100%',
                  padding: '10px',
                  backgroundColor: gameTitle.trim() ? '#333' : '#ccc',
                  color: 'white',
                  border: 'none',
                  borderRadius: '4px',
                  cursor: gameTitle.trim() ? 'pointer' : 'not-allowed',
                  fontSize: '14px',
                  fontWeight: '600'
                }}
              >
                Start Game
              </button>
            </div>
          </div>
        );
      }

      return (
        <div style={{ marginTop: '16px' }}>
          <div style={{ backgroundColor: '#fff3cd', padding: '16px', borderRadius: '8px', marginBottom: '24px', border: '0.5px solid #ffecb5' }}>
            <h2 style={{ margin: '0 0 4px 0', fontSize: '20px', fontWeight: '600' }}>{currentGame.title}</h2>
            <div style={{ fontSize: '14px', color: '#666' }}>Game Date: {currentGame.date}</div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '24px' }}>
            <div style={{ backgroundColor: '#f9f9f9', padding: '16px', borderRadius: '8px', border: '0.5px solid #ddd' }}>
              <h3 style={{ margin: '0 0 12px 0', fontSize: '14px', fontWeight: '600' }}>Log Substitution</h3>
              <div style={{ display: 'grid', gap: '8px' }}>
                <div>
                  <label style={{ display: 'block', fontSize: '12px', color: '#666', marginBottom: '4px' }}>Player IN</label>
                  <select id="playerIn" style={{ width: '100%', padding: '8px 12px', border: '0.5px solid #ccc', borderRadius: '4px', fontSize: '14px' }}>
                    <option value="">Select...</option>
                    {team.players.map(p => (<option key={p.id} value={p.name}>#{p.number}  {p.name}</option>))}
                  </select>
                </div>
                <div>
                  <label style={{ display: 'block', fontSize: '12px', color: '#666', marginBottom: '4px' }}>Player OUT</label>
                  <select id="playerOut" style={{ width: '100%', padding: '8px 12px', border: '0.5px solid #ccc', borderRadius: '4px', fontSize: '14px' }}>
                    <option value="">Select...</option>
                    {team.players.map(p => (<option key={p.id} value={p.name}>#{p.number}  {p.name}</option>))}
                  </select>
                </div>
                <button
                  onClick={() => {
                    const playerIn = document.getElementById('playerIn').value;
                    const playerOut = document.getElementById('playerOut').value;
                    if (playerIn && playerOut) {
                      logSubstitution(playerIn, playerOut);
                      document.getElementById('playerIn').value = '';
                      document.getElementById('playerOut').value = '';
                    }
                  }}
                  style={{ padding: '8px 16px', backgroundColor: '#333', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontSize: '14px', fontWeight: '600' }}
                >
                  Log Sub
                </button>
              </div>
            </div>

            <div style={{ backgroundColor: '#f0f0f0', padding: '16px', borderRadius: '8px', border: '0.5px solid #ddd' }}>
              <h3 style={{ margin: '0 0 12px 0', fontSize: '14px', fontWeight: '600' }}>Substitution Log</h3>
              {subs.length === 0 ? (
                <div style={{ color: '#999', fontSize: '14px' }}>No substitutions yet</div>
              ) : (
                <div style={{ display: 'grid', gap: '6px', maxHeight: '300px', overflowY: 'auto' }}>
                  {subs.map((sub, idx) => (
                    <div key={idx} style={{ fontSize: '13px', paddingBottom: '6px', borderBottom: '0.5px solid #ddd' }}>
                      <div style={{ color: '#999', fontSize: '11px' }}>{sub.time}</div>
                      <div><span style={{ color: '#d00', fontWeight: '500' }}>{sub.out}</span> → <span style={{ color: '#080', fontWeight: '500' }}>{sub.in}</span></div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          <button
            onClick={endGame}
            style={{
              padding: '10px 24px',
              backgroundColor: '#333',
              color: 'white',
              border: 'none',
              borderRadius: '4px',
              cursor: 'pointer',
              fontSize: '14px',
              fontWeight: '600'
            }}
          >
            Save Game
          </button>
        </div>
      );
    };

    ReactDOM.render(<FootballAppPro />, document.getElementById('root'));
  </script>
</body>
</html>
